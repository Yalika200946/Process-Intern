[pytest]
testpaths = tests
# -p no:langsmith: an unrelated globally-installed pytest plugin (langsmith) fails to import
# in some dev environments (xxhash DLL blocked by local Application Control policy) -- not
# a CPHT dependency, disabling its autoload here so `pytest tests/` works out of the box
# without every contributor needing to discover and remember this flag themselves.
addopts = -p no:langsmith
