const EVENT_COLOR={DATA_START:BCP.blue,SWITCH:'#8c52ff',TAM:BCP.black};

const shortMY=iso=>{try{const d=parseISO(iso);return d.toLocaleDateString('th-TH',{month:'short'})+"'"+String(d.getFullYear()+543).slice(2);}catch(e){return'';}};
function TsChart({data,lines,refs,events,height=190,yDomain,unit,eventLabels}){
  return(
   <div style={{width:'100%',height}}><ResponsiveContainer>
    <ComposedChart data={data} margin={{top:eventLabels?16:6,right:10,left:-12,bottom:0}}>
      <CartesianGrid stroke="#EEF0ED" vertical={false}/>
      <XAxis dataKey="date" tickFormatter={d=>parseISO(d).toLocaleDateString('en-US',{month:'short',year:'2-digit'})} minTickGap={50} tick={{fill:BCP.dgray,fontSize:10}} axisLine={{stroke:'#E4E7E3'}} tickLine={false}/>
      <YAxis domain={yDomain||['auto','auto']} tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false} width={44}/>
      <RTooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 8px 30px rgba(0,0,0,.12)',fontSize:11}} labelFormatter={d=>thaiDate(d)}/>
      {(refs||[]).map((r,i)=><ReferenceLine key={'r'+i} y={r.y} stroke={r.c} strokeDasharray="5 4" strokeWidth={1} label={{value:r.label,position:'right',fill:r.c,fontSize:9}}/>)}
      {(events||[]).map((e,i)=><ReferenceLine key={'e'+i} x={e.date} stroke={EVENT_COLOR[e.type]||BCP.gray} strokeWidth={1} strokeDasharray={e.type==='TAM'?'0':'2 3'} opacity={.6}
        label={eventLabels&&e.type!=='DATA_START'?{value:(e.type==='TAM'?'TAM ':'swap ')+shortMY(e.date),position:'top',fill:EVENT_COLOR[e.type]||BCP.gray,fontSize:8.5,fontWeight:600}:undefined}/>)}
      {lines.map(l=><Line key={l.key} type="monotone" dataKey={l.key} name={l.name} stroke={l.c} strokeWidth={l.w||1.8} dot={false} connectNulls/>)}
      {lines.length>1&&<Legend verticalAlign="top" height={22} iconType="plainline" wrapperStyle={{fontSize:11}}/>}
    </ComposedChart></ResponsiveContainer></div>);
}

/* collapsible "ที่มาการคำนวณ" panel — reused under every calc-heavy chart (ข้อ A) */
function Basis({title='ที่มาการคำนวณ (Basis)',children}){
  const [open,setOpen]=useState(false);
  return(<div className="mt-2 rounded-lg border border-black/[.06] bg-black/[.015]">
    <button onClick={()=>setOpen(o=>!o)} className="w-full flex items-center gap-1.5 px-3 py-1.5 text-[11px] font-semibold text-bcp-dgray hover:text-bcp-black">
      <span className="text-bcp-turq">ⓘ</span>{title}<span className="ml-auto text-[10px]">{open?'▲':'▼'}</span></button>
    {open&&<div className="px-3 pb-2.5 text-[11px] leading-relaxed text-bcp-black/70 space-y-1">{children}</div>}
  </div>);
}
const AssumedTag=()=><span className="text-[9px] text-bcp-orange bg-bcp-orange/10 px-1.5 py-0.5 rounded-full ml-1 align-middle">ค่าสมมติ</span>;
const addDaysISO=(iso,n)=>{const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};

/* End-of-Run duty/fouling forecast with U_relative ↔ duty(Q) toggle (ข้อ 1) */
function EndOfRunChart({hx,eor,series}){
  const [mode,setMode]=useState('urel');
  if(!eor||!eor.hx||!eor.hx[hx]) return(
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-6 text-center text-bcp-dgray">
      ยังไม่มีข้อมูล End-of-Run — รัน <code className="text-bcp-black">python pipeline/export_end_of_run.py</code></div>);
  const h=eor.hx[hx], asOf=eor.as_of, isU=mode==='urel', blk=isU?h.urel:h.duty, c=h.consequence;
  const data=useMemo(()=>{
    const map={};
    if(series){const N=series.dates.length,st=Math.max(0,N-120);
      for(let i=st;i<N;i++){const v=isU?series.U_relative[i]:series.Q[i]; if(v!=null)map[series.dates[i]]={date:series.dates[i],act:v};}}
    (blk.proj?.days||[]).forEach((d,i)=>{const dt=addDaysISO(asOf,d),val=isU?blk.proj.val[i]:blk.proj.q[i];
      map[dt]={...(map[dt]||{date:dt}),prj:val};});
    return Object.values(map).sort((a,b)=>a.date<b.date?-1:1);
  },[hx,mode,series]);
  const thr=isU?blk.trigger:blk.q_trigger, cleanRef=isU?1.0:blk.clean_Q;
  const past=blk.past_trigger, days=blk.days_remaining, pdate=blk.projected_date;
  return(
   <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
    <div className="flex items-start justify-between flex-wrap gap-2 mb-1">
      <div><h3 className="text-[14px] font-bold text-bcp-black">End of Run · เหลือเวลาก่อนต้องล้าง — <span className="text-bcp-green">{hx}</span></h3>
        <p className="text-[11px] text-bcp-dgray mt-0.5">เส้นทึบ = ค่าจริง (120 วันล่าสุดของรอบปัจจุบัน) · เส้นประ = แนวโน้มพยากรณ์ล่วงหน้าไปถึงเกณฑ์ล้าง — ต่างจากกราฟด้านบนที่เป็นข้อมูลย้อนหลังทั้งหมด</p></div>
      <div className="flex rounded-lg overflow-hidden border border-black/10 text-[11px]">
        <button onClick={()=>setMode('urel')} className={`px-2.5 py-1 font-semibold ${isU?'bg-bcp-green text-white':'text-bcp-dgray'}`}>Fouling (U_rel)</button>
        <button onClick={()=>setMode('duty')} className={`px-2.5 py-1 font-semibold ${!isU?'bg-bcp-orange text-white':'text-bcp-dgray'}`}>Duty (Q kW)</button>
      </div>
    </div>
    <div style={{width:'100%',height:230}}><ResponsiveContainer>
      <ComposedChart data={data} margin={{top:8,right:14,left:-6,bottom:0}}>
        <CartesianGrid stroke="#EEF0ED" vertical={false}/>
        <XAxis dataKey="date" tickFormatter={d=>parseISO(d).toLocaleDateString('en-US',{month:'short',year:'2-digit'})} minTickGap={44} tick={{fill:BCP.dgray,fontSize:10}} axisLine={{stroke:'#E4E7E3'}} tickLine={false}/>
        <YAxis domain={isU?[0,1.3]:['auto','auto']} tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false} width={44}/>
        <RTooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 8px 30px rgba(0,0,0,.12)',fontSize:11}} labelFormatter={d=>thaiDate(d)}/>
        {cleanRef!=null&&<ReferenceLine y={cleanRef} stroke={BCP.green} strokeDasharray="5 4" strokeWidth={1} label={{value:'สะอาด',position:'right',fill:BCP.green,fontSize:9}}/>}
        {thr!=null&&<ReferenceLine y={thr} stroke={BCP.orange} strokeDasharray="6 4" strokeWidth={1.4} label={{value:'เกณฑ์ล้าง',position:'right',fill:BCP.orange,fontSize:9}}/>}
        <Line type="monotone" dataKey="act" name="ค่าจริง" stroke={isU?BCP.blue:'#e6550d'} strokeWidth={2} dot={false} connectNulls/>
        <Line type="monotone" dataKey="prj" name="พยากรณ์" stroke={BCP.black} strokeWidth={1.8} strokeDasharray="5 5" dot={false} connectNulls/>
      </ComposedChart></ResponsiveContainer></div>
    <div className="mt-1.5 flex flex-wrap gap-x-5 gap-y-1 text-[11.5px]">
      {past?<span className="text-bcp-red font-semibold">⚠ เลยเกณฑ์ล้างแล้ว — ควรวางแผนล้าง</span>
        :days!=null?<span className="text-bcp-black">เหลือถึงเกณฑ์: <b className="text-bcp-orange">~{Math.round(days)} วัน</b>{pdate&&<span className="text-bcp-dgray"> ({thaiDate(pdate)})</span>}
          {isU&&blk.curve_projection&&<span className="text-bcp-dgray text-[10px]"> · ตามเส้นโค้ง asymptotic</span>}</span>
        :<span className="text-bcp-green">แนวโน้มยังไม่ถึงเกณฑ์ (ไม่แย่ลง)</span>}
      {c.q_loss_now_kW!=null&&<span className="text-bcp-dgray">Duty หาย <b className="text-bcp-black">{fmt(c.q_loss_now_kW,0)} kW</b>{c.q_loss_pct!=null&&` (${fmt(c.q_loss_pct,0)}%)`}</span>}
      {c.cit_loss_now_C!=null&&<span className="text-bcp-dgray">คืน CIT ได้ <b className="text-bcp-green">+{fmt(c.cit_loss_now_C,1)}°C</b></span>}
    </div>
    <Basis title="ที่มา End-of-Run + เกณฑ์ล้าง">
      <div>• <b>Fouling view (trigger):</b> U_relative = U/U_clean (1.0 = สะอาด, ไม่ขึ้นกับ throughput). เกณฑ์ล้าง = 1 − {fmt((eor.trigger_drop_frac||0)*100,1)}% = <b>{fmt(eor.trigger_urel,3)}</b> (notebook 09 / METHODOLOGY §4).</div>
      <div>• <b>Duty view (consequence):</b> Q duty จริง [kW] เทียบ Q สภาพสะอาด (โมเดล); เกณฑ์ = clean_Q − threshold_shortfall (จาก 3b).</div>
      <div>• เวลาที่เหลือ (Fouling view) = ถ้ารอบปัจจุบัน fit ได้เป็นเส้นโค้ง asymptotic (Kern-Seaton) และมีข้อมูลพอเชื่อถือ tau ได้ → extrapolate ตามเส้นโค้งจริงถึงเกณฑ์ (ไม่ใช่เส้นตรงจาก tail slope ซึ่งจะประเมิน "วันที่ต้องล้าง" เร็วเกินไปสำหรับรอบที่กำลังชะลอตัว); ถ้าไม่เข้าเงื่อนไข fallback เป็น extrapolate เชิงเส้น. เวลาที่เหลือ (Duty view) = extrapolate เชิงเส้นเสมอ (วิธีเดียวกับ Time_To_Clean_Prediction). Q↔CIT ใช้ sensitivity จาก 2c → คืน CIT {c.cit_sensitivity_degC_per_Qnorm!=null?`(${fmt(c.cit_sensitivity_degC_per_Qnorm,2)} °C ต่อ Q_norm)`:''}.</div>
    </Basis>
   </div>);
}

/* Cleaning simulation: "ถ้าล้างในอีก N วัน จะเป็นยังไง" — sawtooth reset + ฿ ที่ประหยัด (ข้อ 2) */
function CleaningSim({hx,eor,params}){
  const h=eor&&eor.hx&&eor.hx[hx];
  const maxH=Math.max(30,Math.min(365,daysBetween(new Date(),params.NEXT_TAM)||270));
  const [cleanIn,setCleanIn]=useState(30);
  if(!h) return null;
  const asOf=eor.as_of, c=h.consequence;
  // CIT-loss (°C) linear model: L(t)=L0 + k·t. k from (loss@trigger−loss@now)/days_to_trigger.
  const L0=Math.max(0,c.cit_loss_now_C||0);
  const dDays=h.duty.days_remaining, Ltrig=c.cit_loss_at_trigger_C;
  const k=(Ltrig!=null&&dDays&&dDays>0)?Math.max(0,(Ltrig-L0)/dDays):0;
  const T=Math.min(cleanIn,maxH);
  // ฿/day per °C of CIT (plant formula rate: STD_ENERGY × Feed[KBD] × NG_PRICE — the sim
  // integrates the actual loss curve day-by-day, so the 0.5 decay factor is NOT reapplied)
  const charge=params.__charge||525, bahtPerCday=params.STD_ENERGY*(charge*24/0.1589873/1000)*params.NG_PRICE;
  const data=[],step=Math.max(3,Math.round(maxH/60)); let saved=0;
  for(let t=0;t<=maxH;t+=step){
    const noclean=L0+k*t;
    const clean=t<T?noclean:Math.max(0,k*(t-T));   // reset to ~0 at clean, regrow
    saved+=Math.max(0,noclean-clean)*bahtPerCday*step;
    data.push({day:t,date:addDaysISO(asOf,t),noclean:+noclean.toFixed(2),clean:+clean.toFixed(2)});
  }
  return(
   <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
    <div className="flex items-center justify-between flex-wrap gap-2 mb-1">
      <h3 className="text-[14px] font-bold text-bcp-black">จำลองการล้าง (Simulation) · <span className="text-bcp-green">{hx}</span></h3>
      <span className="text-[10px] text-bcp-orange bg-bcp-orange/10 px-2 py-0.5 rounded-full">฿ เป็นค่าสมมติ</span>
    </div>
    <p className="text-[11px] text-bcp-dgray mb-2">เลื่อนเพื่อเลือกวันล้างในอนาคต → ดูว่า CIT-loss กลับมาที่ 0 แล้วสะสมใหม่ และประหยัดเงินได้เท่าไรเทียบกับปล่อยไว้จนถึง TAM</p>
    <div className="flex items-center gap-3 mb-2">
      <span className="text-[11px] text-bcp-dgray whitespace-nowrap">ล้างในอีก</span>
      <input type="range" min="0" max={maxH} value={cleanIn} onChange={e=>setCleanIn(+e.target.value)} className="flex-1 accent-bcp-green"/>
      <span className="text-[12px] font-bold text-bcp-black whitespace-nowrap w-24 text-right">{T} วัน ({thaiDate(addDaysISO(asOf,T))})</span>
    </div>
    <div style={{width:'100%',height:200}}><ResponsiveContainer>
      <ComposedChart data={data} margin={{top:8,right:12,left:-8,bottom:0}}>
        <CartesianGrid stroke="#EEF0ED" vertical={false}/>
        <XAxis dataKey="date" tickFormatter={d=>parseISO(d).toLocaleDateString('en-US',{month:'short'})} minTickGap={40} tick={{fill:BCP.dgray,fontSize:10}} axisLine={{stroke:'#E4E7E3'}} tickLine={false}/>
        <YAxis tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false} width={40} label={{value:'CIT loss °C',angle:-90,position:'insideLeft',fontSize:9,fill:BCP.dgray}}/>
        <RTooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 8px 30px rgba(0,0,0,.12)',fontSize:11}} labelFormatter={d=>thaiDate(d)}/>
        <ReferenceLine x={addDaysISO(asOf,T)} stroke={BCP.green} strokeWidth={1.4} label={{value:'ล้าง',position:'top',fill:BCP.green,fontSize:9}}/>
        <Line type="monotone" dataKey="noclean" name="ไม่ล้าง" stroke={BCP.red} strokeWidth={1.8} dot={false}/>
        <Line type="monotone" dataKey="clean" name="ล้างตามที่เลือก" stroke={BCP.green} strokeWidth={2} dot={false}/>
        <Legend verticalAlign="top" height={20} iconType="plainline" wrapperStyle={{fontSize:11}}/>
      </ComposedChart></ResponsiveContainer></div>
    <div className="mt-2 rounded-lg bg-bcp-green/[.06] border border-bcp-green/15 px-3 py-2 text-[12px]">
      ล้างในอีก <b>{T} วัน</b> → ประหยัดพลังงานเตาสะสมถึง TAM ~<b className="text-bcp-green">{Math.round(saved).toLocaleString()} ฿</b>
      {k>0?<span className="text-bcp-dgray"> · CIT-loss โตขึ้น ~{fmt(k*30,2)}°C/เดือน</span>:<span className="text-bcp-dgray"> · แนวโน้มคงที่</span>}
    </div>
    <Basis title="ที่มาการจำลอง + สูตร ฿">
      <div>• CIT-loss(t) = L₀ + k·t (เชิงเส้น) · L₀ = คืน CIT ได้ตอนนี้ = {fmt(L0,2)}°C · k จาก (loss@เกณฑ์ − loss ตอนนี้)/วันถึงเกณฑ์.</div>
      <div>• ล้าง ณ วัน T → reset CIT-loss ≈ 0 แล้วโตใหม่ที่อัตราเดิม · พื้นที่ต่างระหว่างสองเส้น = พลังงานที่ประหยัด.</div>
      <div>• ฿/วัน ต่อ °C = STD_ENERGY({params.STD_ENERGY}) × Feed[KBD] × NG({params.NG_PRICE}) = <b>{Math.round(bahtPerCday).toLocaleString()} ฿/วัน/°C</b> (สูตรโรงงาน — sim คิด decay จากเส้นจริง จึงไม่คูณ 0.5 ซ้ำ).</div>
    </Basis>
   </div>);
}

function HXDetailPanel({hxts,units,selected,onSelect,eor,params,chist}){
  if(!hxts) return(
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-8 text-center text-bcp-dgray fade-up">
      <div className="text-3xl mb-2">📈</div>ยังไม่มีข้อมูล time-series — รัน <code className="text-bcp-black">python pipeline/export_hx_timeseries.py</code> ก่อน</div>);
  const HXES=Object.keys(hxts);
  const sel=hxts[selected]?selected:HXES[0];
  const d=hxts[sel]; const s=d.series;
  // build row-wise data for recharts
  const rows=useMemo(()=>s.dates.map((dt,i)=>({date:dt,U:s.U_relative[i],Q:s.Q[i],pred:s.predicted_Q?.[i],
    dev:s.deviation?.[i],cin:s.cold_in?.[i],cout:s.cold_out?.[i],
    hin:s.hot_in?.[i],hout:s.hot_out?.[i],cflow:s.cold_flow?.[i],hflow:s.hot_flow?.[i]})),[sel]);
  const u=units[sel]||{}; const st=statusOf(u); const meta=ST[st];
  const mt=d.meta||{}; const eh=eor&&eor.hx&&eor.hx[sel];
  const HEALTH_C={critical:BCP.red,warn:BCP.orange,watch:'#D9A400',ok:BCP.green};

  return(
   <div className="space-y-5 fade-up">
    {/* HX selector */}
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-4">
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <h2 className="text-[15px] font-bold text-bcp-black">รายละเอียดต่อ HX · เลือกเครื่องเพื่อดูกราฟ (เหมือน notebook 02)</h2>
        <span className="text-[11px] text-bcp-dgray">คลิกเลือก HX ด้านล่าง</span>
      </div>
      <div className="flex flex-wrap gap-1.5">
        {HXES.map(hx=>{const m=ST[statusOf(units[hx])];const on=sel===hx;return(
          <button key={hx} onClick={()=>onSelect(hx)}
            className={`px-2.5 py-1 rounded-lg text-[12px] font-semibold border transition-colors ${on?'text-white':'text-bcp-black bg-white hover:bg-black/[.03]'}`}
            style={on?{background:m.c,borderColor:m.c}:{borderColor:'#e5e7eb'}}>{hx}</button>);})}
      </div>
    </div>

    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
      <div className="flex items-center gap-3 mb-1">
        <div className="h-9 w-9 rounded-lg grid place-items-center text-white font-bold text-[13px]" style={{background:meta.c}}>{u.priority_rank?`#${u.priority_rank}`:'—'}</div>
        <div><div className="text-[17px] font-bold text-bcp-black">{sel} <span className="text-[12px] font-medium text-bcp-dgray">· สายร้อน: {mt.hot_stream||'—'}</span></div>
          <span className="text-[9px] font-semibold px-2 py-0.5 rounded-full text-white" style={{background:meta.c}}>{meta.th} · {meta.label}</span>
          {eh&&<span className="text-[9px] font-semibold px-2 py-0.5 rounded-full text-white ml-1" style={{background:HEALTH_C[eh.health]||BCP.gray}}>
            {eh.health==='critical'?'ประสิทธิภาพลดลงมาก':eh.health==='warn'?'เฝ้าระวัง':eh.health==='watch'?'ติดตาม':'ปกติ'}</span>}
          {eh&&eh.urel&&eh.urel.rate_source&&eh.urel.rate_source!=='current_run'&&
            <span className="text-[9px] font-semibold px-2 py-0.5 rounded-full bg-bcp-orange/10 text-bcp-orange ml-1" title="รอบปัจจุบันยังไม่มีอัตรา fouling ที่ผ่านเกณฑ์เชื่อถือได้ (physics gate) — ใช้รอบก่อนหน้า/การ fit ชั่วคราว จึงงดสรุปแนวโน้ม">
            ⚠ rate ไม่ใช่รอบปัจจุบัน</span>}</div>
      </div>
      {/* degradation signals (ข้อ 6) */}
      {eh&&eh.signals&&eh.signals.length>0&&<div className="mb-2 rounded-lg bg-black/[.02] border border-black/[.05] px-3 py-2">
        <div className="text-[10px] font-bold uppercase tracking-wide text-bcp-dgray mb-1">สัญญาณประสิทธิภาพ</div>
        <ul className="text-[11.5px] text-bcp-black/80 space-y-0.5">
          {eh.signals.map((s,i)=><li key={i} className="flex gap-1.5"><span className="text-bcp-turq">•</span>{s}</li>)}</ul>
      </div>}
      <p className="text-[11px] text-bcp-dgray mb-2">เส้นตั้ง = เหตุการณ์ (<span style={{color:EVENT_COLOR.SWITCH}}>สลับเชลล์</span> / <span style={{color:BCP.black}}>TAM</span>)</p>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-x-6 gap-y-3">
        <div>
          <div className="text-[12px] font-semibold text-bcp-black mb-0.5">1) U_relative (ตะกรัน) — sawtooth</div>
          <p className="text-[10px] text-bcp-dgray mb-1">1.0 = สะอาด · ตกลง = สกปรก · กระโดดขึ้น = ล้าง/สลับเชลล์ · ดูแนวโน้มทั้งหมดย้อนหลัง — พยากรณ์เวลาที่เหลือของรอบปัจจุบัน ดู "End-of-Run" ด้านล่าง</p>
          <TsChart data={rows} yDomain={[0,1.4]} events={d.events} eventLabels
            refs={[{y:1.0,c:BCP.green,label:'clean'},{y:0.5,c:BCP.orange,label:'50%'},{y:0.3,c:BCP.red,label:'30%'}]}
            lines={[{key:'U',name:'U_relative',c:BCP.blue}]}/>
        </div>
        <div>
          <div className="text-[12px] font-semibold text-bcp-black mb-0.5">2) ค่าทำนาย vs ค่าจริง (Q)</div>
          <p className="text-[10px] text-bcp-dgray mb-1">เส้นทำนาย (โมเดลสภาพสะอาด ตาม flow+อุณหภูมิขณะนั้น) เทียบ Q จริง — ช่องว่าง = fouling · เส้นตั้ง = เหตุการณ์ล้าง</p>
          <TsChart data={rows} events={d.events} eventLabels lines={[
            {key:'pred',name:'predicted (clean)',c:BCP.turq,w:1.6},{key:'Q',name:'actual',c:'#e6550d',w:1.8}]}/>
        </div>
        <div>
          <div className="text-[12px] font-semibold text-bcp-black mb-0.5">3) อุณหภูมิ crude เข้า–ออก (°C)</div>
          <p className="text-[10px] text-bcp-dgray mb-1">cold_in → cold_out (สายเย็น)</p>
          <TsChart data={rows} events={d.events} lines={[
            {key:'cin',name:'cold in',c:BCP.blue,w:1.5},{key:'cout',name:'cold out',c:'#17becf',w:1.8}]}/>
        </div>
        {mt.has_hot&&<div>
          <div className="text-[12px] font-semibold text-bcp-black mb-0.5">4) อุณหภูมิสายร้อน เข้า–ออก (°C) · {mt.hot_stream}</div>
          <p className="text-[10px] text-bcp-dgray mb-1">hot_in → hot_out — ตัวขับความร้อน (ใช้คำนวณ effectiveness)</p>
          <TsChart data={rows} events={d.events} lines={[
            {key:'hin',name:'hot in',c:'#C0392B',w:1.8},{key:'hout',name:'hot out',c:'#EA7600',w:1.5}]}/>
        </div>}
        {(mt.has_flow||mt.hot_flow_tag)&&<div>
          <div className="text-[12px] font-semibold text-bcp-black mb-0.5">5) อัตราการไหล (m³/h)</div>
          <p className="text-[10px] text-bcp-dgray mb-1">crude {mt.cold_flow_tag?`(${mt.cold_flow_tag.replace('.pv','')})`:''}{mt.hot_flow_tag?` · สายร้อน (${mt.hot_flow_tag.replace('.pv','')})`:''}</p>
          <TsChart data={rows} events={d.events} lines={[
            {key:'cflow',name:'crude flow',c:BCP.blue,w:1.6},...(mt.hot_flow_tag?[{key:'hflow',name:'hot flow',c:'#C0392B',w:1.4}]:[])]}/>
        </div>}
      </div>
      <Basis title="ที่มา: Q duty · effectiveness · U_relative">
        <div>• <b>Q duty (cold-side):</b> Q = ρ·flow·Cp·(T_cold_out − T_cold_in)/3600 [kW] · ρ=850 kg/m³<AssumedTag/> Cp=2.2 kJ/kg·K<AssumedTag/> (cpht_features.py). สายร้อน/flow แสดงเพื่อความโปร่งใสของตัวแปรที่ใช้.</div>
        <div>• <b>Effectiveness ε</b> = (T_cold_out − T_cold_in)/(T_hot_in − T_cold_in) · <b>U_relative</b> = U/U_clean (1.0 = สะอาด) — ตกลง = ตะกรันสะสม.</div>
      </Basis>
    </div>

    {/* End-of-Run forecast + Cleaning simulation (ข้อ 1, 2) */}
    <div className="grid grid-cols-1 xl:grid-cols-2 gap-5">
      <EndOfRunChart hx={sel} eor={eor} series={s}/>
      <CleaningSim hx={sel} eor={eor} params={params}/>
    </div>

    {/* fouling rate per run */}
    {d.runs&&d.runs.length>0&&<div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
      <h3 className="text-[14px] font-bold text-bcp-black mb-1">อัตราการเกิดตะกรันต่อรอบเดินเครื่อง (fouling rate per run)</h3>
      <p className="text-[11px] text-bcp-dgray mb-3">dU_relative/เดือน = อัตราปัจจุบัน (tail slope ของเส้นโค้งที่ fit ได้ดีที่สุด — เส้นตรงหรือ asymptotic) · คอลัมน์ R² คือของเส้นตรง Theil-Sen ไว้เทียบเท่านั้น ส่วนธง "เชื่อได้" ตัดสินจาก R² ของโมเดลที่เลือกจริง ≥0.3 และไม่ oscillate (ดูเกณฑ์เต็มที่แท็บ "หลักฐาน & ความเชื่อมั่น") — บางรอบจึงอาจโชว์ R² เส้นตรงต่ำแต่ยัง "เชื่อได้" ถ้าโค้ง asymptotic fit เข้ากับข้อมูลดีกว่า</p>
      <table className="w-full text-[12px]">
        <thead><tr className="text-left text-[10px] uppercase text-bcp-dgray border-b border-black/[.05]">
          <th className="py-2">Run</th><th className="py-2 text-right">ระยะ (วัน)</th><th className="py-2 text-right">dUrel/เดือน</th><th className="py-2 text-right">R²</th><th className="py-2 text-center">คุณภาพ</th></tr></thead>
        <tbody className="divide-y divide-black/[.03]">
          {d.runs.map((r,i)=>(<tr key={i}>
            <td className="py-2 font-semibold">Run {r.run}</td>
            <td className="py-2 text-right tabular-nums">{r.duration_days!=null?Math.round(r.duration_days):'—'}</td>
            <td className={`py-2 text-right tabular-nums font-semibold ${r.dUrel_per_month<0?'text-bcp-red':'text-bcp-green'}`}>{r.dUrel_per_month!=null?(r.dUrel_per_month>0?'+':'')+fmt(r.dUrel_per_month,3):'—'}</td>
            <td className="py-2 text-right tabular-nums text-bcp-dgray">{fmt(r.R2,2)}</td>
            <td className="py-2 text-center">{r.reliable?<span className="text-bcp-green">✓ เชื่อได้</span>:<span className="text-bcp-orange">⚠ อ่อน</span>}</td></tr>))}
        </tbody>
      </table>
    </div>}

    {/* Cleaning Audit History (ประวัติการล้างที่เคยทำจริง — วัดจริง vs โมเดล) */}
    {chist&&chist.hx&&chist.hx[sel]&&<CleaningAuditTable ch={chist.hx[sel]} criteria={chist.criteria} hx={sel}/>}
   </div>);
}

/* per-HX cleaning audit history — each past clean event with measured vs model recovery */
function CleaningAuditTable({ch,criteria,hx}){
  const cleans=ch.cleans||[]; const sn=ch.sensitivity||{}; const fc=ch.forecast_next;
  const EVC={SWITCH:'#8c52ff',TAM:BCP.black};
  return(
   <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
    <div className="flex items-start justify-between flex-wrap gap-2 mb-1">
      <div><h3 className="text-[14px] font-bold text-bcp-black">ประวัติการล้าง (Cleaning Audit History) · <span className="text-bcp-green">{hx}</span></h3>
        <p className="text-[11px] text-bcp-dgray mt-0.5">ทุกครั้งที่เคยล้าง/สลับเชลล์/TAM — เทียบ CIT ที่คืน "วัดจริง" กับ "โมเดล" เพื่อตรวจหลักการ</p></div>
      <span className="text-[10.5px] text-bcp-dgray">sensitivity {sn.CIT_sensitivity_degC_per_Qnorm!=null?fmt(sn.CIT_sensitivity_degC_per_Qnorm,2):'—'} °C/Q_norm · corr {sn.Q_CIT_corr!=null?fmt(sn.Q_CIT_corr,2):'—'}{sn.is_terminal_CIT&&<span className="text-bcp-turq"> · ปลายเทรน (cold_out=CIT)</span>}</span>
    </div>
    {cleans.length===0?<div className="text-[12px] text-bcp-dgray py-3">ยังไม่พบเหตุการณ์ล้างในช่วงข้อมูล (ไม่เคยล้าง online — รอ TAM)</div>:
    <div className="overflow-x-auto"><table className="w-full text-[12px]">
      <thead><tr className="text-left text-[10px] uppercase text-bcp-dgray border-b border-black/[.05]">
        <th className="py-2">วันที่</th><th className="py-2">ประเภท</th><th className="py-2 text-right">รอบก่อน dUrel/ด.</th><th className="py-2 text-center">R²</th>
        <th className="py-2 text-right">U ก่อน→หลัง</th><th className="py-2 text-right">Q คืน (kW)</th>
        <th className="py-2 text-right">CIT คืน วัดจริง</th><th className="py-2 text-right">CIT โมเดล</th><th className="py-2">หมายเหตุ</th></tr></thead>
      <tbody className="divide-y divide-black/[.03]">
        {cleans.map((c,i)=>{const re=c.run_ended;return(<tr key={i}>
          <td className="py-2 font-semibold text-bcp-black">{thaiDate(c.date)}</td>
          <td className="py-2"><span className="text-white text-[9px] font-semibold px-2 py-0.5 rounded-full" style={{background:EVC[c.type]||BCP.gray}}>{c.type}</span></td>
          <td className={`py-2 text-right tabular-nums ${re&&re.dUrel_per_month<0?'text-bcp-red':'text-bcp-dgray'}`}>{re&&re.dUrel_per_month!=null?fmt(re.dUrel_per_month,3):'—'}</td>
          <td className="py-2 text-center tabular-nums">{re?(re.reliable?<span className="text-bcp-green">{fmt(re.R2,2)}✓</span>:<span className="text-bcp-orange">{fmt(re.R2,2)}⚠</span>):'—'}</td>
          <td className="py-2 text-right tabular-nums">{c.U_before!=null&&c.U_after!=null?<span>{fmt(c.U_before,2)}→{fmt(c.U_after,2)} {c.U_recovered!=null&&<b className={c.U_recovered>0?'text-bcp-green':'text-bcp-red'}>({c.U_recovered>0?'+':''}{fmt(c.U_recovered,2)})</b>}</span>:'—'}</td>
          <td className={`py-2 text-right tabular-nums ${c.Q_recovered_kW>0?'text-bcp-green':'text-bcp-dgray'}`}>{c.Q_recovered_kW!=null?(c.Q_recovered_kW>0?'+':'')+fmt(c.Q_recovered_kW,0):'—'}</td>
          <td className="py-2 text-right tabular-nums font-semibold">{c.cit_measured_C!=null?<span className={c.gain_estimable?(c.cit_measured_C>0?'text-bcp-green':'text-bcp-red'):'text-bcp-dgray'}>{c.cit_measured_C>0?'+':''}{fmt(c.cit_measured_C,1)}°{!c.gain_estimable&&<span title="sensitivity อ่อน/downstream">*</span>}</span>:'—'}</td>
          <td className="py-2 text-right tabular-nums text-bcp-turq">{c.cit_model_C!=null?'+'+fmt(c.cit_model_C,1)+'°':'—'}</td>
          <td className="py-2 text-[10.5px] text-bcp-dgray">{c.note||(c.cit_measured_method==='cold_out jump (=CIT ตรง)'?'วัด CIT ตรงจาก cold_out':'')}</td></tr>);})}
        {fc&&<tr className="bg-bcp-orange/[.05]">
          <td className="py-2 font-semibold text-bcp-orange">{fc.past_trigger?'ถึงเกณฑ์แล้ว':fc.projected_date?thaiDate(fc.projected_date):'—'}</td>
          <td className="py-2"><span className="text-[9px] font-semibold px-2 py-0.5 rounded-full bg-bcp-orange/20 text-bcp-orange">คาดการณ์</span></td>
          <td className="py-2 text-right text-[10.5px] text-bcp-dgray" colSpan={3}>ครั้งถัดไปที่ควรล้าง{fc.days_remaining!=null&&!fc.past_trigger?` (~${Math.round(fc.days_remaining)} วัน)`:''}</td>
          <td className="py-2"></td>
          <td className="py-2 text-right tabular-nums font-semibold text-bcp-green">{fc.cit_loss_now_C!=null?'+'+fmt(fc.cit_loss_now_C,1)+'°':'—'}</td>
          <td className="py-2 text-[10px] text-bcp-dgray" colSpan={2}>CIT ที่คาดจะคืนถ้าล้างตอนนี้</td></tr>}
      </tbody></table></div>}
    <Basis title="เกณฑ์การวิเคราะห์ (สำหรับวิศวกรตรวจหลักการ)">
      <div>• <b>fouling rate:</b> {criteria?.fouling_rate}</div>
      <div>• <b>quality gate:</b> {criteria?.quality_gate}</div>
      <div>• <b>เกณฑ์ล้าง:</b> {criteria?.clean_trigger}</div>
      <div>• <b>CIT คืน (วัดจริง):</b> {criteria?.cit_recovery_measured}</div>
      <div>• <b>CIT คืน (โมเดล):</b> {criteria?.cit_recovery_model}</div>
      <div className="text-bcp-dgray">* = sensitivity อ่อน/HX ปลายน้ำ → ค่า CIT วัดจริงไม่น่าเชื่อถือ · {criteria?.note}</div>
    </Basis>
   </div>);
}

/* ═════════════════════════ PROGNOSTICS & RISK (PHM) ═════════════════════════ */
function RangeBar({p10,p50,p90,max=180}){
  if(p10==null)return <span className="text-bcp-dgray text-[11px]">— (เสถียร)</span>;
  const sc=v=>Math.min(100,Math.max(0,v/max*100));
  return(<div className="relative h-3 w-full rounded bg-black/[.05]">
    <div className="absolute h-3 rounded bg-bcp-turq/30" style={{left:`${sc(p10)}%`,width:`${Math.max(sc(p90)-sc(p10),1.5)}%`}}/>
    <div className="absolute top-[-1px] h-[14px] w-[2.5px] rounded bg-bcp-black" style={{left:`${sc(p50)}%`}}/>
  </div>);
}
function ProbCell({v}){const c=v>=66?BCP.red:v>=33?BCP.orange:BCP.green;return <span className="font-semibold tabular-nums" style={{color:v>0?c:BCP.dgray}}>{v!=null?Math.round(v)+'%':'—'}</span>;}

function PrognosticsPanel({phm,units,selected,onSelect}){
  if(!phm||!phm.rul)return(
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-8 text-center text-bcp-dgray fade-up">
      <div className="text-3xl mb-2">🔮</div>ยังไม่มีข้อมูล Prognostics — รัน <code className="text-bcp-black">python pipeline/phm_analysis.py</code> ก่อน</div>);
  const {rul,rel,prop,drv}=phm;
  const list=useMemo(()=>Object.keys(rul).filter(h=>units[h]).map(h=>({hx:h,...rul[h]}))
    .sort((a,b)=>(b.prob_90??-1)-(a.prob_90??-1)),[rul,units]);
  const sel=rul[selected]?selected:(list[0]?.hx);
  const R=rul[sel], RL=rel&&rel[sel], PR=prop&&prop.per_hx&&prop.per_hx[sel];

  return(
   <div className="space-y-5 fade-up">
    {/* header */}
    <div className="rounded-2xl bg-gradient-to-br from-[#171733] to-[#241a38] text-white shadow-card p-5">
      <h2 className="text-[16px] font-bold">Prognostics & Risk · พยากรณ์อายุคงเหลือ (RUL) และความเสี่ยง</h2>
      <p className="text-[11.5px] text-white/55 mt-1">RUL = เวลาคงเหลือก่อนถึงเกณฑ์ล้าง (Monte-Carlo P10/P50/P90) · hazard rate จาก Weibull survival · หน่วยเชิงกายภาพ/ความน่าจะเป็นล้วน</p>
    </div>

    {/* RUL risk table */}
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04]">
      <div className="px-5 pt-4 pb-2"><h3 className="text-[14px] font-bold text-bcp-black">อายุคงเหลือก่อนต้องล้าง (RUL) · เรียงตามความเสี่ยง</h3>
        <p className="text-[11px] text-bcp-dgray mt-0.5">แถบ = ช่วง P10–P90 (วัน), ขีดดำ = ค่ากลาง P50 · P(30/60/90) = โอกาสถึงเกณฑ์ภายใน N วัน</p></div>
      <div className="overflow-x-auto"><table className="w-full text-[12px]">
        <thead><tr className="text-left text-[10px] uppercase text-bcp-dgray border-b border-black/[.05]">
          <th className="px-4 py-2">HX</th><th className="px-3 py-2">สถานะ</th><th className="px-3 py-2 text-right">P50 (วัน)</th>
          <th className="px-3 py-2 w-[24%]">ช่วง P10–P90</th><th className="px-3 py-2 text-right">P(30d)</th><th className="px-3 py-2 text-right">P(60d)</th><th className="px-3 py-2 text-right">P(90d)</th></tr></thead>
        <tbody className="divide-y divide-black/[.03]">
          {list.map(r=>{const st=statusOf(units[r.hx]),meta=ST[st],active=sel===r.hx;return(
            <tr key={r.hx} onClick={()=>onSelect(r.hx)} className={`cursor-pointer hover:bg-bcp-green/[.03] ${active?'bg-bcp-green/[.06]':''}`}>
              <td className="px-4 py-2.5 font-bold text-bcp-black">{r.hx}</td>
              <td className="px-3 py-2.5"><span className="text-white text-[9px] font-semibold px-2 py-0.5 rounded-full" style={{background:meta.c}}>{meta.label}</span></td>
              <td className="px-3 py-2.5 text-right font-semibold tabular-nums">{r.past_threshold?'0 (เลยแล้ว)':r.p50!=null?Math.round(r.p50):'—'}</td>
              <td className="px-3 py-2.5"><RangeBar p10={r.past_threshold?0:r.p10} p50={r.past_threshold?0:r.p50} p90={r.past_threshold?0:r.p90}/></td>
              <td className="px-3 py-2.5 text-right"><ProbCell v={r.prob_30}/></td>
              <td className="px-3 py-2.5 text-right"><ProbCell v={r.prob_60}/></td>
              <td className="px-3 py-2.5 text-right"><ProbCell v={r.prob_90}/></td></tr>);})}
        </tbody></table></div>
    </div>

    {/* selected HX: reliability + model comparison */}
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      {/* reliability / hazard */}
      <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
        <h3 className="text-[14px] font-bold text-bcp-black">Reliability & Hazard · <span className="text-bcp-green">{sel}</span></h3>
        <p className="text-[11px] text-bcp-dgray mt-0.5 mb-2">Weibull survival จากประวัติรอบเดินเครื่อง · เส้น = โอกาสยัง "สะอาดพอ" R(t)</p>
        {RL?(<>
          <div className="grid grid-cols-3 gap-2 mb-3 text-center">
            <div className="rounded-lg bg-black/[.03] p-2"><div className="text-[10px] text-bcp-dgray">Weibull shape</div><div className="text-[16px] font-bold">{fmt(RL.shape,2)}</div><div className="text-[8.5px] text-bcp-dgray">{RL.shape>1?'เสื่อมเร็วขึ้นตามเวลา':'สุ่ม'}</div></div>
            <div className="rounded-lg bg-black/[.03] p-2"><div className="text-[10px] text-bcp-dgray">MTBC (เฉลี่ย)</div><div className="text-[16px] font-bold">{Math.round(RL.mtbc)}<span className="text-[10px] font-normal"> วัน</span></div></div>
            <div className="rounded-lg bg-black/[.03] p-2"><div className="text-[10px] text-bcp-dgray">อายุปัจจุบัน</div><div className="text-[16px] font-bold">{Math.round(RL.days_on_duty)}<span className="text-[10px] font-normal"> วัน</span></div></div>
          </div>
          <div style={{width:'100%',height:170}}><ResponsiveContainer>
            <ComposedChart data={RL.curve} margin={{top:6,right:8,left:-14,bottom:0}}>
              <CartesianGrid stroke="#EEF0ED" vertical={false}/>
              <XAxis dataKey="t" tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v+'d'}/>
              <YAxis tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false} domain={[0,1]}/>
              <RTooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 8px 30px rgba(0,0,0,.12)',fontSize:11}} formatter={(v,n)=>n==='R'?[fmt(v,2),'R(t)']:[v,n]}/>
              <Area type="monotone" dataKey="R" stroke={BCP.turq} strokeWidth={2} fill={BCP.turq} fillOpacity=".12" name="R"/>
            </ComposedChart></ResponsiveContainer></div>
          <div className="flex items-center justify-between mt-2 text-[11px]">
            <span className="text-bcp-dgray">P(ต้องล้างภายใน): </span>
            <span>30d <b style={{color:BCP.orange}}>{Math.round(RL.prob_30)}%</b> · 60d <b style={{color:BCP.orange}}>{Math.round(RL.prob_60)}%</b> · 90d <b style={{color:BCP.red}}>{Math.round(RL.prob_90)}%</b></span>
          </div>
          {RL.confidence!=='ok'&&<div className="mt-2 text-[10.5px] text-bcp-orange bg-bcp-orange/10 rounded px-2 py-1">⚠ n={RL.n_runs} รอบ (น้อย) — ใช้ค่า shape ร่วมจาก pool, ความเชื่อมั่นต่ำ</div>}
        </>):<div className="text-bcp-dgray text-[12px] py-6 text-center">ไม่มีข้อมูล reliability</div>}
      </div>

        {PR?(<>

            <tbody>{PR.models.map(m=>(<tr key={m.name} className="border-b border-black/[.03]">

        </>):<div className="text-bcp-dgray text-[12px] py-6 text-center">ไม่มีข้อมูลโมเดล</div>}
      </div>
    </div>

    {/* drivers */}
    {drv&&<div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
      <h3 className="text-[14px] font-bold text-bcp-black">ตัวแปรที่มีผลต่ออัตราการเกิดตะกรัน (Degradation Drivers)</h3>
      <p className="text-[11px] text-bcp-dgray mt-0.5 mb-3">SHAP importance จาก {drv.n} รอบเดินเครื่อง · ลูกศร = ทิศทาง (↑ ตัวแปร → ตะกรันเพิ่ม/ลด)</p>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div style={{width:'100%',height:200}}><ResponsiveContainer>
          <BarChart data={drv.drivers.slice(0,7).map(d=>({name:d.label,v:+d.importance,dir:d.direction}))} layout="vertical" margin={{left:10,right:16,top:4,bottom:0}}>
            <CartesianGrid stroke="#EEF0ED" horizontal={false}/>
            <XAxis type="number" tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false}/>
            <YAxis type="category" dataKey="name" width={96} tick={{fill:BCP.black,fontSize:10.5}} axisLine={false} tickLine={false}/>
            <RTooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 8px 30px rgba(0,0,0,.12)',fontSize:11}}/>
            <Bar dataKey="v" radius={[0,6,6,0]} barSize={15}>{drv.drivers.slice(0,7).map((d,i)=><Cell key={i} fill={d.direction>0?BCP.red:BCP.green}/>)}</Bar>
          </BarChart></ResponsiveContainer></div>
        <div>
          <div className="text-[12px] font-semibold text-bcp-black mb-2">💡 แนวทางลดอัตราการเสื่อม (levers)</div>
          {drv.levers.length?drv.levers.map((l,i)=><div key={i} className="text-[11.5px] text-bcp-black/80 mb-1.5 flex gap-1.5"><span className="text-bcp-green">▸</span>{l}</div>)
            :<div className="text-[11.5px] text-bcp-dgray">ไม่มี lever ที่ควบคุมได้ชัดเจนจากข้อมูลชุดนี้</div>}
          <div className="mt-3 text-[10.5px] text-bcp-orange bg-bcp-orange/10 rounded-lg px-3 py-2">
            ⚠ <b>อ่านอย่างระวัง:</b> CV R² = {fmt(drv.cv_r2_mean,2)} (n={drv.n}) — โมเดลนี้ยัง<b>ทำนายไม่ได้ดี out-of-sample</b> ตัวแปรข้างต้นเป็น<b>ความสัมพันธ์เชิงสังเกต (associative)</b> ไม่ใช่สาเหตุที่พิสูจน์แล้ว ใช้เป็นสมมติฐานตั้งต้น
          </div>
        </div>
      </div>
    </div>}
   </div>);
}

    <Basis title="ที่มาของหน้านี้ (ตรวจสอบได้)">

function App(){

  const [phm,setPhm]=useState(null);
  const [selected,setSelected]=useState('E113A');
  const [simHX,setSimHX]=useState(null);
  const [params,setParams]=useState(DEFAULT_PARAMS);
  const [rerun,setRerun]=useState({busy:false,msg:null,err:false});
  const [hxts,setHxts]=useState(null);
  const [eor,setEor]=useState(null);      // end_of_run.json (ข้อ 1,6)
  const [econ,setEcon]=useState(null);    // economics.json (ข้อ 7)
  const [logi,setLogi]=useState(null);    // cleaning_logistics.json (ข้อ 4)
  const [chist,setChist]=useState(null);  // cleaning_history.json (audit ประวัติการล้าง)
  const [tamA,setTamA]=useState(null);    // tam_analysis.json (SOR/EOR 2021-2026)
  const [ev,setEv]=useState(null);        // evidence.json (หลักฐาน & ความเชื่อมั่น)
  const [plan,setPlan]=useState(null);    // cleaning_plan.json (แผนล้าง — notebook 16 cost/constraint optimizer)
  const [engPriority,setEngPriority]=useState([]);  // engineering_priority.json (notebook 08 risk-based ranking)
  // FG_FLOW limit override -- the ONE furnace-tab constraint field the real optimizer reads
  // (via furnace_fg_deficit_ceiling_C). Owned at App level (not per-component localStorage) so
  // FurnacePanel's edit and CleaningPlanPanel's "คำนวณใหม่" POST body always agree; localStorage
  // is just a reload convenience, not the source of truth while the tab is open. Declared here
  // (before the `if(loading)` early return below) since hooks must run unconditionally.
  const [fgLimitOv,setFgLimitOv]=useState(()=>{try{const v=JSON.parse(localStorage.getItem('cpht_fg_flow_limit_override')||'null');return typeof v==='number'?v:null;}catch(e){return null;}});
  const setFgLimitOvPersist=v=>{setFgLimitOv(v);localStorage.setItem('cpht_fg_flow_limit_override',JSON.stringify(v));};

  // Once economics.json loads, overwrite the DEFAULT_PARAMS fallback constants with the
  // pipeline's own published values (pipeline/export_economics.py's PLANT/LEGACY dicts +
  // m3_per_bbl) -- runs exactly once so it doesn't clobber a user's manual edit made
  // afterward via OptimizePanel. If economics.json is missing or predates this field set,
  // the `??` fallbacks leave DEFAULT_PARAMS' hardcoded copies in place.
  const econAppliedRef=useRef(false);
  useEffect(()=>{
    if(econ && !econAppliedRef.current){
      econAppliedRef.current=true;
      const pc=econ.plant_constants||{}, lc=econ.legacy_constants||{};
      setParams(p=>({...p,
        STD_ENERGY:pc.STD_ENERGY??p.STD_ENERGY, NG_PRICE:pc.NG_PRICE??p.NG_PRICE,
        CIT_DECAY:pc.CIT_DECAY_FACTOR??p.CIT_DECAY,
        CP_CRUDE:lc.CP_CRUDE??p.CP_CRUDE, RHO_CRUDE:lc.RHO_CRUDE??p.RHO_CRUDE,
        LHV_FG:lc.LHV_FG??p.LHV_FG, FURNACE_EFF:lc.FURNACE_EFF??p.FURNACE_EFF,
        FG_PRICE:lc.FG_PRICE??p.FG_PRICE, CO2_FACTOR:lc.CO2_FACTOR??p.CO2_FACTOR,
        M3_PER_BBL:econ.m3_per_bbl??p.M3_PER_BBL,
      }));
    }
  },[econ]);

  const load=useCallback(()=>{
    setLoading(true);
    const opt=n=>loadJSON(n).catch(()=>null); // optional files (may not be generated yet)
    Promise.all([loadJSON('hx_ranking.json'),loadJSON('cleaning_recommendations.json'),loadJSON('model_metrics.json'),loadJSON('forecast_6mo.json'),loadJSON('pfd_topology.json'),
      opt('rul.json'),opt('reliability.json'),opt('propagation_models.json'),opt('drivers.json'),opt('hx_timeseries.json'),
      opt('end_of_run.json'),opt('economics.json'),opt('cleaning_logistics.json'),opt('cleaning_history.json'),
      opt('tam_analysis.json'),opt('evidence.json'),opt('cleaning_plan.json'),opt('engineering_priority.json')])
      .then(([rk,rc,md,fc,tp,rul,rel,prop,drv,ts,eo,ec,lg,ch,ta,evd,pl,ep])=>{setRanking(rk);setRecs(rc);setModels(md);setForecast(fc);setTopo(tp);
        setPhm({rul,rel,prop,drv});setHxts(ts);setEor(eo);setEcon(ec);setLogi(lg);setChist(ch);setTamA(ta);setEv(evd);setPlan(pl);setEngPriority(ep||[]);setLoading(false);})
      .catch(e=>{setErr(e.message);setLoading(false);});
  },[]);
  useEffect(load,[load]);

  // Freshness check (Phase 1 item B4 + Phase 2 Part F): server.py's /api/run "quick update"
  // only regenerates pfd_topology.json (see its own docstring above and
  // CURRENT_PIPELINE_MAP.md's dashboard dependency-boundary section) -- ranking/economics
  // can silently stay from an older full pipeline run. Compare Last-Modified across the
  // files the Overview tab combines and surface it instead of showing a combination that
  // was never generated together. STALE_THRESHOLD_MS gives room for the small clock skew
  // between writes within one real pipeline run (export_engineering_priority.py and
  // export_economics.py run seconds apart in pipeline/run_all.py's POST list, not
  // simultaneously).
  //
  // Second check (Phase 2 Part F): hx_ranking.json and engineering_priority.json are both
  // passthroughs of the SAME notebook-08 score (docs/CURRENT_PIPELINE_MAP.md's "Ranking/score
  // traceability" table) two different hops downstream -- they should always match for a HX
  // from the same pipeline run. A partial rerun (e.g. `--only 13` without also running
  // notebook 08) leaves them holding different runs' numbers, exactly the scenario that
  // produced a live mismatch during Phase 2 testing. `pipeline/export_engineering_priority.py`
  // now warns about this server-side too (its own mtime check) -- this is the client-side
  // surface of the same gap.
  const [freshness,setFreshness]=useState({checked:false,stale:false});
  useEffect(()=>{
    Promise.all([fetchLastModified('pfd_topology.json'),fetchLastModified('economics.json'),
      fetchLastModified('hx_ranking.json'),fetchLastModified('engineering_priority.json')])
      .then(([topoTime,econTime,rankTime,engTime])=>{
        if(topoTime==null&&(rankTime==null||engTime==null)){setFreshness({checked:false,stale:false});return;}
        const STALE_THRESHOLD_MS=5*60*1000;   // 5 min -- generously above normal same-run write skew
        const topoStale=topoTime!=null&&((econTime!=null&&topoTime-econTime>STALE_THRESHOLD_MS)
                  ||(rankTime!=null&&topoTime-rankTime>STALE_THRESHOLD_MS));
        const rankVsEngStale=rankTime!=null&&engTime!=null
                  &&Math.abs(rankTime-engTime)>STALE_THRESHOLD_MS;
        setFreshness({checked:true,stale:topoStale||rankVsEngStale,topoStale,rankVsEngStale,
          topoTime,econTime,rankTime,engTime});
      });
  },[]);

  const units=useMemo(()=>{
    const m={};(topo?.order||[]).forEach(hx=>m[hx]={HX:hx});
    ranking.forEach(r=>m[r.HX]={...(m[r.HX]||{HX:r.HX}),...r});
    recs.forEach(r=>m[r.HX]={...(m[r.HX]||{HX:r.HX}),...r});
    // engineering_priority.json (notebook 08's risk-based Probability x Consequence / Effort
    // ranking) is the ranking authority for the Overview & P&ID tab -- merged last so its
    // priority_rank/effort_tier/expected_CIT_gain_C/safety_flag/worsening win over the
    // SHAP-based hx_ranking.json/cleaning_recommendations.json fields above. Deliberately NOT
    // merging plan.per_hx (notebook 16's cost-aware scheduling optimizer) here -- that ranking
    // stays scoped to the Plan tab only (CleaningPlanPanel reads `plan` directly), since the two
    // rankings answer different questions (risk triage vs. constrained cost optimization) and
    // are not meant to agree.
    engPriority.forEach(r=>m[r.HX]={...(m[r.HX]||{HX:r.HX}),...r});
    return m;
  },[ranking,recs,engPriority,topo]);

  const onSelect=useCallback(hx=>{setSelected(hx);setSimHX(s=>s&&s!==hx?null:s);},[]);
  const onSim=useCallback(()=>setSimHX(p=>p===selected?null:selected),[selected]);
  const onRerun=useCallback(async(file,p)=>{
    if(!file){setRerun({busy:false,msg:'กรุณาเลือกไฟล์ก่อน',err:true});return;}
    setRerun({busy:true,msg:null,err:false});
    try{
      // raw-body upload (no multipart) — filename + params travel in headers
      const r=await fetch('/api/run',{method:'POST',body:file,
        headers:{'X-Filename':file.name,'X-Params':JSON.stringify(p)}});
      const j=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(j.error||('HTTP '+r.status)+(j.missing_tags?' — ขาด: '+j.missing_tags.join(', '):''));
      setRerun({busy:false,msg:'✓ '+(j.message||'สำเร็จ')+' · โหลดผลใหม่แล้ว',err:false});
      load();
    }catch(e){
      setRerun({busy:false,err:true,msg:'ไม่สำเร็จ: '+e.message+' — หากยังไม่เปิด backend ให้รัน: python backend/server.py แล้วเปิด http://localhost:8899'});
    }
  },[load]);
  const onRunFull=useCallback(async(file)=>{
    setRerun({busy:true,msg:null,err:false});
    try{
      const headers=file?{'X-Filename':file.name}:{};
      const r=await fetch('/api/run-full',{method:'POST',body:file||null,headers});
      const j=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
      setRerun({busy:false,err:false,msg:'✓ '+(j.message||'เริ่มแล้ว')+' — '+(j.note||'')});
    }catch(e){
      setRerun({busy:false,err:true,msg:'ไม่สำเร็จ: '+e.message+' — เปิด backend: python backend/server.py'});
    }
  },[]);

  if(loading)return <Splash/>;
  if(err)return <ErrBox msg={err}/>;

  const curUnit=units[selected], curFc=forecast[selected], simActive=simHX===selected;
  const urgent=recs.filter(r=>(r.recommended_action||'').startsWith('Clean now')).length;
  const atRisk=recs.filter(r=>r.at_risk_within_6mo).length;
  const cit=topo?.furnace?.find(x=>x.key==='CIT')?.value;
  const tamDays=daysBetween(new Date(),params.NEXT_TAM);
  const top1=engPriority.slice().sort((a,b)=>(b.engineering_priority_score||0)-(a.engineering_priority_score||0))[0];
  const engPriorityByHX=Object.fromEntries(engPriority.map(r=>[r.HX,r]));

  const TABS=[['overview','ภาพรวม & P&ID'],['plan','แผนล้าง HX'],['phm','พยากรณ์ & ความเสี่ยง'],['furnace','เตา & โมเดล Optimization'],['evidence','หลักฐาน & ความเชื่อมั่น']];

  return(
   <div className="min-h-screen font-sans text-bcp-black">
    {DEMO && <div className="bg-bcp-orange text-white text-[12px] text-center py-1.5 px-4 font-medium">
      🔒 DEMO · ข้อมูลจำลอง (anonymized) — tag และค่าทั้งหมดถูกสุ่มแทน ไม่ใช่ข้อมูลจริงของโรงงาน · ฟังก์ชันอัปโหลด/วิเคราะห์ปิดในโหมดนี้</div>}
    <header className="sticky top-0 z-30 glass border-b border-black/[.06]">
      <div className="max-w-[1440px] mx-auto px-6 h-[58px] flex items-center justify-between">
        <div className="flex items-center gap-3">
          <img src="bangchak-logo.png" alt="Bangchak" className="h-7 object-contain"/>
          <div className="hidden sm:block border-l border-black/10 pl-3">
            <div className="text-[13px] font-bold leading-tight">CPHT Predictive Maintenance</div>
            <div className="text-[10.5px] text-bcp-dgray">Plant 3 TPU · ทำนายตะกรัน & วางแผนล้าง Heat Exchanger</div></div>
        </div>
        <div className="flex items-center gap-2 text-[11px] text-bcp-dgray">
          <span className="h-2 w-2 rounded-full bg-bcp-green animate-pulse"/>ข้อมูล {topo?.last_timestamp?.slice(0,10)}</div>
      </div>
      <div className="max-w-[1440px] mx-auto px-6 flex gap-1 text-[13px]">
        {TABS.map(([k,l])=>(<button key={k} onClick={()=>setTab(k)} className={`tabbtn relative px-3 py-2.5 text-bcp-dgray hover:text-bcp-black ${tab===k?'active':''}`}>{l}</button>))}
      </div>
    </header>

    <main className="max-w-[1440px] mx-auto px-5 py-6 space-y-5">
      {tab==='overview'&&<>
        <section className="grid grid-cols-2 lg:grid-cols-4 gap-4">
          <Kpi icon="🌡" tone={cit<params.CIT_MIN?'orange':'green'} label="CIT ปัจจุบัน" value={`${fmt(cit,1)}°C`} sub={cit<params.CIT_MIN?`ต่ำกว่าเกณฑ์ ${params.CIT_MIN}°C`:`เป้า ${params.CIT_TARGET}°C`} foot={`ขาด ${fmt(Math.max(0,params.CIT_TARGET-cit),1)}°C จากเป้า`}/>
          <Kpi icon="🧽" tone={urgent>3?'orange':'green'} label="ต้องล้างด่วน" value={`${urgent} HX`} sub={`จาก ${recs.length} ที่ติดตาม`} foot={`เสี่ยงใน 6 เดือน: ${atRisk}`}/>
          <Kpi icon="🏆" tone="orange" label="อันดับ 1 (ความเสี่ยง)" value={top1?.HX||'—'} sub={top1?`Priority ${fmt(top1.engineering_priority_score,2)}`:''} foot={`${top1?(effortTH[top1.effort_tier]||'—'):''} · อันดับความเสี่ยง (Prob×Consequence/Effort) — ใช้เป็นลำดับหลักเดียวกับแท็บ "แผนล้าง HX" แล้ว (ความคุ้มค่า×ข้อจำกัดเป็นข้อมูลประกอบ ไม่ใช่ตัวจัดอันดับ)`}/>
          <Kpi icon="🛠" tone="blue" label="TAM ถัดไป" value={`${tamDays} วัน`} sub={thaiDate(params.NEXT_TAM)} foot="Turnaround Maintenance"/>
        </section>
        <PID topo={topo} units={units} selected={selected} onSelect={onSelect}/>
        <section className="grid grid-cols-1 lg:grid-cols-12 gap-5">
          <div className="lg:col-span-4"><DetailPanel hx={selected} unit={curUnit} onSim={onSim} simActive={simActive} fc={curFc} node={topo?.nodes?.[selected]}/></div>
          <div className="lg:col-span-8"><ForecastChart hx={selected} fc={curFc} simActive={simActive} unit={curUnit}/></div>
        </section>
        <HXDetailPanel hxts={hxts} units={units} selected={selected} onSelect={onSelect} eor={eor} params={params} chist={chist}/>
      </>}
      {tab==='phm'&&<PrognosticsPanel phm={phm} units={units} selected={selected} onSelect={onSelect}/>}
      {tab==='plan'&&<>
        <CleaningPlanPanel plan={plan} onPlanUpdated={setPlan} fgLimitOv={fgLimitOv}/>
        <CitLimitWhatIf tamA={tamA} topo={topo} params={params} econ={econ}/>
        <SlideChart tamA={tamA}/>
        <LogisticsTable logi={logi}/>
      </>}
      {tab==='furnace'&&<>
        <FurnacePanel topo={topo} params={params} setParams={setParams} ranking={ranking} economics={econ} engPriorityByHX={engPriorityByHX} fgLimitOv={fgLimitOv} setFgLimitOv={setFgLimitOvPersist} freshness={freshness}/>
        <ModelPanel models={models} ranking={ranking}/>
        <OptimizePanel params={params} setParams={setParams} onRerun={onRerun} onRunFull={onRunFull} status={rerun}/>
      </>}
      {tab==='evidence'&&<EvidencePanel ev={ev} econ={econ}/>}
      <footer className="pt-2 pb-8 text-center text-[11px] text-bcp-dgray">
        Bangchak CPHT Predictive Maintenance · ข้อมูลจาก <code className="text-bcp-black/60">dashboard/data/*.json</code> (notebooks 08/06/10-13) · P&ID ตาม cpht_config topology
      </footer>
    </main>
   </div>);
}

function Kpi({icon,label,value,sub,foot,tone='green'}){
  const ring={green:'from-bcp-green/10 to-bcp-lime/10',orange:'from-bcp-orange/12 to-bcp-orange/5',blue:'from-bcp-blue/10 to-bcp-turq/10'}[tone];
  const acc={green:BCP.green,orange:BCP.orange,blue:BCP.blue}[tone];
  return(<div className="fade-up relative overflow-hidden rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
    <div className={`absolute -right-8 -top-8 h-28 w-28 rounded-full bg-gradient-to-br ${ring}`}/>
    <div className="relative"><div className="flex items-start justify-between">
      <div><div className="text-[10px] font-semibold uppercase tracking-[.12em] text-bcp-dgray">{label}</div>
        <div className="mt-2 text-[26px] leading-none font-bold text-bcp-black">{value}</div>
        {sub&&<div className="mt-1 text-[12px] font-medium" style={{color:acc}}>{sub}</div>}</div>
      <div className="text-xl grid place-items-center h-9 w-9 rounded-xl" style={{background:`${acc}14`,color:acc}}>{icon}</div></div>
      {foot&&<div className="mt-3 pt-2.5 border-t border-black/[.04] text-[10.5px] text-bcp-dgray">{foot}</div>}</div>
  </div>);
}
function Splash(){return <div className="min-h-screen grid place-items-center"><div className="text-center"><div className="mx-auto h-14 w-14 rounded-full border-[3px] border-bcp-gray/30 border-t-bcp-green animate-spin"/><div className="mt-5 text-bcp-dgray text-sm">กำลังโหลด…</div></div></div>;}
function ErrBox({msg}){return <div className="min-h-screen grid place-items-center p-6"><div className="max-w-md bg-white rounded-2xl shadow-card p-6 border-l-4 border-bcp-orange"><div className="font-bold text-bcp-orange text-lg">โหลดข้อมูลไม่สำเร็จ</div><p className="text-sm mt-2">{msg}</p><pre className="mt-3 bg-bcp-black text-bcp-lime text-[12px] rounded-lg p-3 overflow-x-auto">cd dashboard{'\n'}python -m http.server 8811</pre><p className="text-[12px] text-bcp-dgray mt-2">เปิด http://localhost:8811/</p></div></div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
