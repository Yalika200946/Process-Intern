<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bangchak · CPHT Predictive Maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script>
tailwind.config={theme:{extend:{
 colors:{bcp:{green:'#48A23F',lime:'#84B000',orange:'#EA7600',gray:'#BBBCBC',black:'#2D2926',dgray:'#888B8D',blue:'#005B99',turq:'#00B2A9',red:'#E4572E'}},
 fontFamily:{sans:['Prompt','sans-serif']},
 boxShadow:{card:'0 1px 3px rgba(45,41,38,.06),0 6px 20px rgba(45,41,38,.05)',lift:'0 10px 34px rgba(45,41,38,.16)'}}}};
</script>
<style>
html{scroll-behavior:smooth}
body{background:radial-gradient(ellipse 900px 400px at 100% 0%,rgba(132,176,0,.06),transparent),radial-gradient(ellipse 800px 380px at 0% 100%,rgba(0,178,169,.05),transparent),#F4F6F2}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
@keyframes flow{to{stroke-dashoffset:-22}}
.anim-flow{stroke-dasharray:5 7;animation:flow 1s linear infinite}
@keyframes svgPulse{0%,100%{opacity:.35;r:26}50%{opacity:0;r:36}}
.glass{background:rgba(255,255,255,.82);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%)}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#Cfd3cc;border-radius:8px}
.recharts-surface:focus{outline:none}
.tabbtn.active{color:#2D2926;font-weight:600}
.tabbtn.active::after{content:'';position:absolute;left:10px;right:10px;bottom:-9px;height:3px;border-radius:3px;background:#48A23F}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useMemo,useCallback,useRef}=React;
const {ResponsiveContainer,ComposedChart,Line,Area,XAxis,YAxis,CartesianGrid,Tooltip:RTooltip,BarChart,Bar,Cell,ReferenceLine,Legend}=Recharts;

/* ═════════ THEME / HELPERS ═════════ */
const BCP={green:'#48A23F',lime:'#84B000',orange:'#EA7600',gray:'#BBBCBC',black:'#2D2926',dgray:'#888B8D',blue:'#005B99',turq:'#00B2A9',red:'#E4572E'};
const DATA_DIR='./data';
const DEMO = (typeof window!=='undefined') && !!window.__DEMO__;  // set true in demo/index.html (anonymized, no backend)
const fmt=(v,d=1)=>(v==null||Number.isNaN(+v))?'—':Number(v).toFixed(d);
const daysBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/864e5);
const parseISO=s=>new Date(s+'T00:00:00');
const thaiDate=iso=>iso?parseISO(iso).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'numeric'}):'—';
async function loadJSON(n){const r=await fetch(`${DATA_DIR}/${n}?t=${Date.now()}`);if(!r.ok)throw new Error(`${n}: ${r.status}`);return r.json();}
// Last-Modified (backend/server.py's do_GET sets it from the file's mtime) lets the dashboard
// detect when /api/run's "quick update" (topology only, see server.py's own docstring) has left
// pfd_topology.json newer than hx_ranking.json/economics.json -- i.e. the ranking/economics shown
// alongside the current topology are from an older pipeline run. Returns null (not 0) when the
// header is unavailable (e.g. a plain static file server, or the demo build) so callers can tell
// "not checked" apart from a real timestamp of zero.
async function fetchLastModified(n){
  try{const r=await fetch(`${DATA_DIR}/${n}?t=${Date.now()}`);if(!r.ok)return null;
    const lm=r.headers.get('Last-Modified');return lm?new Date(lm).getTime():null;}
  catch(e){return null;}
}

/* default optimization params (user-adjustable, mirror cpht_features / brief).
   These are FALLBACK values only, used until dashboard/data/economics.json loads --
   see App()'s econ-merge effect, which overwrites the overlapping fields (everything
   except CIT_TARGET/CIT_MIN/NEXT_TAM/W_*, which aren't published there) with the
   pipeline's own published constants so there is one source of truth instead of a
   second hardcoded copy silently drifting from pipeline/export_economics.py. */
const DEFAULT_PARAMS={
  CIT_TARGET:258.05, CIT_MIN:250, CP_CRUDE:2.2, RHO_CRUDE:850,
  LHV_FG:48000, FURNACE_EFF:0.88, NEXT_TAM:'2028-06-01',
  W_SAFETY:2.0, W_ENERGY:1.0, W_CO2:0.5,
  // สูตรโรงงานจริง (Energy Saving Benefit slide 3E-113): ค่าจริงจากวิศวกร
  STD_ENERGY:0.74, NG_PRICE:390, CIT_DECAY:0.5,
  // legacy assumptions (สูตร LHV/η — cross-check; FG_PRICE เป็นค่าสมมติ)
  FG_PRICE:18000, CLEANING_COST:300000, CO2_PRICE:1000, CO2_FACTOR:2.75,
  M3_PER_BBL:0.1589873,
};

/* ═════════ P&ID LAYOUT ═════════ */
const POS={
 'E101AB':{x:150,y:80},'E101CD':{x:150,y:150},'E101EF':{x:150,y:220},'E101G':{x:150,y:290},
 'E102':{x:300,y:150},
 'E106AB':{x:520,y:90},'E107AB':{x:660,y:90},'E108AB':{x:800,y:90},'E109AB':{x:940,y:90},
 'E110ABC':{x:520,y:240},'E111':{x:660,y:240},'E112AB':{x:800,y:240},
 'E103AB':{x:520,y:390},'E104':{x:660,y:390},'E105AB':{x:800,y:390},
 'E113A':{x:1030,y:195},'E112C':{x:1030,y:300},
};
const CANVAS={w:1240,h:500};
const HOT_COLOR={'Residue':'#C0392B','Gas Oil':'#E67E22','Kerosene':'#8E44AD'};
const hotColor=s=>{for(const k in HOT_COLOR)if((s||'').includes(k))return HOT_COLOR[k];return '#B9770E';};
function tempColor(t){if(t==null)return '#BBBCBC';const f=Math.max(0,Math.min(1,(t-40)/220));const a=[0,91,153],b=[228,87,46];const m=a.map((x,i)=>Math.round(x+(b[i]-x)*f));return `rgb(${m[0]},${m[1]},${m[2]})`;}

/* ═════════ STATUS ═════════ */
function statusOf(u){if(!u||u.priority_rank==null)return 'none';const a=u.recommended_action||'';if(a.startsWith('Clean now'))return 'critical';if(/^\d{4}-\d{2}-\d{2}$/.test(a))return 'scheduled';if(a.startsWith('Stable'))return 'stable';return 'ok';}
const ST={critical:{c:BCP.orange,label:'Clean-Now',th:'ต้องล้างด่วน'},scheduled:{c:BCP.lime,label:'Scheduled',th:'มีกำหนดล้าง'},ok:{c:BCP.green,label:'Healthy',th:'ปกติ'},stable:{c:BCP.green,label:'Stable',th:'เสถียร'},none:{c:BCP.gray,label:'No Data',th:'ไม่มีข้อมูล'}};
const effortTH={'ONLINE_CLEAN_DEMONSTRATED':'ล้างออนไลน์ได้','SWAP_CAPABLE':'สลับเชลล์ได้','ONLINE_FULL':'ล้างออนไลน์ได้ (เต็ม)','ONLINE_PARTIAL':'ล้างออนไลน์ได้ (บางส่วน)','TAM_ONLY':'รอ TAM'};

/* ═════════════════════════ P&ID DIAGRAM (vibrant node-network) ═════════════════════════ */
/* palette taken from the user's own E101AB.svg design */
const STREAM_C={'Residue':'#ff66c4','Gas Oil':'#ff751f','Kerosene':'#8c52ff'};
const streamColor=s=>{for(const k in STREAM_C)if((s||'').includes(k))return STREAM_C[k];return '#0cc0df';};
const crudeColor=t=>{if(t==null)return '#5b6472';const f=Math.max(0,Math.min(1,(t-40)/220));const a=[56,182,255],b=[255,102,196];const m=a.map((x,i)=>Math.round(x+(b[i]-x)*f));return `rgb(${m[0]},${m[1]},${m[2]})`;};
const NODE_GRAD={critical:['#ffb14d','#ff4d6d'],scheduled:['#ffe066','#ff8a3c'],ok:['#66e0a3','#0097b2'],stable:['#66e0a3','#0097b2'],none:['#7a828c','#3a4150']};
const curve=(x1,y1,x2,y2)=>{const mx=(x1+x2)/2;return `M ${x1},${y1} C ${mx},${y1} ${mx},${y2} ${x2},${y2}`;};

function PID({topo,units,selected,onSelect}){
  const [hover,setHover]=useState(null);
  if(!topo) return <div className="p-10 text-center text-bcp-dgray">กำลังโหลดแผนผัง…</div>;
  const nodes=topo.nodes;
  const HX=Object.keys(POS);
  const pipes=[];
  HX.forEach(hx=>{const n=nodes[hx]; if(!n)return; const p=n.predecessor; if(p&&POS[p])pipes.push({from:POS[p],to:POS[hx],t:n.cold_in_val});});
  // hot-stream connections: link HX where one's hot outlet == next's hot inlet (counter-current path)
  const hotPipes=[];
  HX.forEach(a=>{const na=nodes[a]; if(!na||!na.hot_out_tag)return;
    HX.forEach(b=>{const nb=nodes[b]; if(!nb||a===b||!nb.hot_in_tag)return;
      if(na.hot_out_tag===nb.hot_in_tag&&POS[a]&&POS[b]) hotPipes.push({from:POS[a],to:POS[b],c:streamColor(na.hot_stream)});});});

  return (
   <div className="rounded-2xl shadow-card overflow-hidden fade-up" style={{background:'linear-gradient(160deg,#171733 0%,#1e1b3a 55%,#241a38 100%)'}}>
    <div className="px-5 pt-4 pb-2 flex flex-wrap items-center justify-between gap-2">
      <div>
        <h2 className="text-[15px] font-bold text-white">Process Flow Diagram · แผนผังโยงสาย Crude Preheat Train</h2>
        <p className="text-[11px] text-white/45 mt-0.5">โหนดสี = สถานะล้าง · เส้นฟ้า→ชมพู = crude (เย็น→ร้อน) · เส้นสีอื่น = hot stream · คลิกโหนดเพื่อดูรายละเอียด · ค่า ณ {topo.last_timestamp?.slice(0,10)}</p>
      </div>
      <div className="flex flex-col items-end gap-1.5">
        <div className="flex flex-wrap items-center gap-3 text-[10.5px] text-white/55">
          {[['critical','Clean-Now'],['scheduled','Scheduled'],['ok','Healthy'],['none','No Data']].map(([s,l])=>
            <span key={s} className="flex items-center gap-1.5"><span className="h-2.5 w-2.5 rounded-full" style={{background:`linear-gradient(135deg,${NODE_GRAD[s][0]},${NODE_GRAD[s][1]})`}}/>{l}</span>)}
        </div>
        <div className="flex flex-wrap items-center gap-3 text-[10px] text-white/40">
          <span className="text-white/30">Hot streams:</span>
          {[['Residue','Residue'],['Gas Oil','Gas Oil'],['Kerosene','Kerosene'],['Side Run','Side-run']].map(([k,l])=>
            <span key={k} className="flex items-center gap-1"><svg width="14" height="4"><line x1="0" y1="2" x2="14" y2="2" stroke={streamColor(k)} strokeWidth="3"/></svg>{l}</span>)}
        </div>
      </div>
    </div>
    <div className="relative px-2 pb-3 overflow-x-auto">
     <svg viewBox={`0 0 ${CANVAS.w} ${CANVAS.h}`} className="w-full min-w-[920px] h-auto" onMouseLeave={()=>setHover(null)}>
      <defs>
        {Object.entries(NODE_GRAD).map(([k,[a,b]])=>(
          <linearGradient key={k} id={`ng-${k}`} x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor={a}/><stop offset="1" stopColor={b}/></linearGradient>))}
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>

      {/* group frames */}
      <rect x="40" y="42" width="330" height="298" rx="16" fill="#ffffff" opacity=".03" stroke="#38b6ff" strokeOpacity=".22"/>
      <text x="56" y="62" fontSize="11" fontWeight="600" fill="#38b6ff" opacity=".85">CPHT-1 · ก่อน Desalter</text>
      <rect x="450" y="42" width="662" height="440" rx="16" fill="#ffffff" opacity=".03" stroke="#ff66c4" strokeOpacity=".18"/>
      <text x="466" y="62" fontSize="11" fontWeight="600" fill="#ff8fd6" opacity=".85">CPHT-2 · เพิ่ม CIT ก่อนเข้าเตา</text>

      {/* crude header + inlet */}
      <text x="30" y="330" fontSize="10.5" fontWeight="600" fill="#38b6ff">Crude In →</text>
      <path d={curve(95,325,150,290)} fill="none" stroke={crudeColor(40)} strokeWidth="3.5" opacity=".7"/>
      <line x1="110" y1="80" x2="110" y2="290" stroke={crudeColor(60)} strokeWidth="3" opacity=".4"/>
      {['E101AB','E101CD','E101EF','E101G'].map(hx=><path key={hx} d={curve(110,POS[hx].y,POS[hx].x-24,POS[hx].y)} fill="none" stroke={crudeColor(nodes[hx]?.cold_in_val)} strokeWidth="3" opacity=".6"/>)}

      {/* hot-stream connections (counter-current path, dashed, under nodes) */}
      {hotPipes.map((p,i)=>(
        <path key={'h'+i} d={curve(p.from.x,p.from.y,p.to.x,p.to.y)} fill="none"
              stroke={p.c} strokeWidth="2.4" opacity=".45" strokeDasharray="2 5"/>
      ))}

      {/* crude pipes (predecessor chain) — glowing curves */}
      {pipes.map((p,i)=>(
        <path key={i} d={curve(p.from.x+24,p.from.y,p.to.x-24,p.to.y)} fill="none"
              stroke={crudeColor(p.t)} strokeWidth="3.5" opacity=".8" className="anim-flow" style={{filter:'drop-shadow(0 0 3px rgba(120,180,255,.5))'}}/>
      ))}

      {/* desalter */}
      <rect x="268" y="255" width="64" height="34" rx="9" fill="#0f0f26" stroke="#38b6ff" strokeWidth="1.5"/>
      <text x="300" y="276" textAnchor="middle" fontSize="9" fontWeight="600" fill="#8fd0ff">Desalter</text>
      <path d={curve(332,272,440,200)} fill="none" stroke={crudeColor(150)} strokeWidth="2.5" opacity=".45" strokeDasharray="5 5"/>

      {/* Furnace */}
      <rect x="1140" y="168" width="68" height="94" rx="12" fill="#0d0d20" stroke="#ff751f" strokeWidth="1.5" style={{filter:'drop-shadow(0 0 8px rgba(255,117,31,.4))'}}/>
      <text x="1174" y="194" textAnchor="middle" fill="#fff" fontSize="9" fontWeight="600">FURNACE</text>
      <text x="1174" y="210" textAnchor="middle" fill="#ffb14d" fontSize="8">F101</text>
      <text x="1174" y="233" textAnchor="middle" fill="#ffde59" fontSize="13" fontWeight="700">CIT</text>
      <text x="1174" y="250" textAnchor="middle" fill="#ffb14d" fontSize="11" fontWeight="600">{fmt(nodes['E113A']?.cold_out_val,0)}°</text>
      <path d={curve(1056,200,1140,206)} fill="none" stroke={crudeColor(nodes['E113A']?.cold_out_val)} strokeWidth="4" opacity=".85" className="anim-flow"/>

      {/* HX nodes */}
      {HX.map(hx=>{
        const n=nodes[hx]; const pos=POS[hx]; if(!pos) return null;
        const u=units[hx]; const st=statusOf(u); const meta=ST[st];
        const sel=selected===hx; const rank=u&&u.priority_rank; const noData=!n||n.cold_out_val==null;
        const R=27;
        return (
         <g key={hx} style={{cursor:'pointer'}} onClick={()=>onSelect(hx)} onMouseEnter={()=>setHover(hx)}>
           {/* hot stream stub */}
           {n&&n.hot_stream&&n.hot_stream!=='—'&&(
             <g>
               <line x1={pos.x} y1={pos.y-R-14} x2={pos.x} y2={pos.y-R+2} stroke={streamColor(n.hot_stream)} strokeWidth="3" opacity=".9"/>
               <text x={pos.x} y={pos.y-R-17} textAnchor="middle" fontSize="8" fill={streamColor(n.hot_stream)} fontWeight="600">{n.hot_stream}</text>
             </g>)}
           {st==='critical'&&<circle cx={pos.x} cy={pos.y} r={R} fill="#ff5e7e" style={{animation:'svgPulse 2s infinite'}}/>}
           {sel&&<circle cx={pos.x} cy={pos.y} r={R+7} fill="none" stroke="#fff" strokeWidth="2" strokeDasharray="4 4" opacity=".8"/>}
           {/* gradient circle node */}
           <circle cx={pos.x} cy={pos.y} r={R} fill={`url(#ng-${st})`} stroke="#ffffff" strokeOpacity={sel?.9:.25} strokeWidth={sel?2.5:1.2}
                   style={{filter:noData?'none':'drop-shadow(0 3px 8px rgba(0,0,0,.45))'}}/>
           <text x={pos.x} y={pos.y+3.5} textAnchor="middle" fontSize={hx.length>5?'9':'10.5'} fontWeight="700" fill="#fff">{hx}</text>
           {/* outlet tag */}
           {n&&n.cold_out_val!=null&&(
             <text x={pos.x} y={pos.y+R+13} textAnchor="middle" fontSize="8" fill="#ffffff" opacity=".55">{n.cold_out_tag?.replace('.pv','')} · {fmt(n.cold_out_val,0)}°</text>)}
           {rank&&rank<=5&&(<g><title>อันดับความเสี่ยง #{rank} (Probability×Consequence/Effort) — คนละอันดับกับแท็บ "แผนล้าง HX"</title><circle cx={pos.x+R-4} cy={pos.y-R+4} r="9" fill="#fff"/><text x={pos.x+R-4} y={pos.y-R+7.3} textAnchor="middle" fontSize="8.5" fontWeight="700" fill={NODE_GRAD[st][1]}>{rank}</text></g>)}
         </g>);
      })}
     </svg>

     {/* hover tooltip */}
     {hover&&nodes[hover]&&(()=>{
       const pos=POS[hover],n=nodes[hover],u=units[hover],st=statusOf(u),meta=ST[st];
       const left=(pos.x/CANVAS.w)*100, top=(pos.y/CANVAS.h)*100, above=pos.y>CANVAS.h*0.45;
       return (
        <div className="pointer-events-none absolute z-20" style={{left:`${left}%`,top:`${top}%`,transform:`translate(-50%,${above?'-118%':'34%'})`}}>
         <div className="rounded-xl shadow-lift px-3.5 py-2.5 w-[214px]" style={{background:'rgba(20,20,44,.94)',border:'1px solid rgba(255,255,255,.12)'}}>
           <div className="flex items-center justify-between mb-1.5"><span className="font-bold text-white text-[14px]">{hover}</span>
             <span className="text-white text-[9px] font-semibold px-2 py-0.5 rounded-full" style={{background:`linear-gradient(135deg,${NODE_GRAD[st][0]},${NODE_GRAD[st][1]})`}}>{meta.label}</span></div>
           <div className="space-y-1 text-[10.5px]">
             {n.cold_flow_tag&&<Row k={`เย็น flow (${n.cold_flow_tag.replace('.pv','')})`} v={`${fmt(n.cold_flow_val,0)} m³/h`}/>}
             <Row k={`เย็นเข้า (${n.cold_in_tag?.replace('.pv','')})`} v={`${fmt(n.cold_in_val,1)}°C`}/>
             <Row k={`เย็นออก (${n.cold_out_tag?.replace('.pv','')})`} v={`${fmt(n.cold_out_val,1)}°C`}/>
             {n.hot_flow_tag&&<Row k={`${n.hot_stream} flow (${n.hot_flow_tag.replace('.pv','')})`} v={`${fmt(n.hot_flow_val,0)} m³/h`}/>}
             <Row k={`${n.hot_stream} เข้า`} v={n.hot_in_val!=null?`${fmt(n.hot_in_val,1)}°C`:'—'}/>
             <Row k={`${n.hot_stream} ออก`} v={n.hot_out_val!=null?`${fmt(n.hot_out_val,1)}°C`:'—'}/>
             {u&&u.priority_rank!=null&&<>
               <div className="border-t border-white/10 my-1"/>
               <Row k="อันดับความเสี่ยง" v={`#${u.priority_rank}`}/>
               <Row k="Fouling rate" v={fmt(u.Q_fouling_rate_abs,2)+'/100d'}/>
               <Row k="วิธีล้าง" v={effortTH[u.online_mode||u.effort_tier]||'—'}/>
             </>}
           </div>
         </div>
        </div>);
     })()}
    </div>
   </div>);
}
function Row({k,v}){return <div className="flex justify-between gap-2"><span className="text-white/50">{k}</span><span className="font-semibold text-white/90">{v}</span></div>;}

/* ═════════════════════════ FURNACE PANEL ═════════════════════════ */
function bandStatus(f){
  if(!f.band){return 'na';}
  const v=f.value,[al,nl,nh,ah]=f.band;
  if(v<al||v>ah)return 'alarm'; if(v<nl||v>nh)return 'warn'; return 'ok';
}
const BAND_C={ok:BCP.green,warn:'#D9A400',alarm:BCP.red,na:BCP.dgray};

const skinColor=t=>{if(t==null)return BCP.gray;const f=Math.max(0,Math.min(1,(t-320)/(410-320)));const a=[72,162,63],b=[228,87,46];const m=a.map((x,i)=>Math.round(x+(b[i]-x)*f));return `rgb(${m[0]},${m[1]},${m[2]})`;};

/* Furnace F101 schematic (Honeywell-style, clean) with live tag values */
function FurnaceSVG({F,passes,cit,params}){
  const g=k=>F.find(x=>x.key===k)||{};
  const o2=g('O2'),draft=g('DRAFT'),cot=g('COT'),fg=g('FG_FLOW'),b1=g('BODY1'),b2=g('BODY2'),stack=g('STACK');
  const py=[112,150,188,226];
  return(
   <svg viewBox="0 0 360 300" className="w-full h-auto" style={{maxHeight:320}}>
    {/* stack */}
    <rect x="250" y="18" width="26" height="70" rx="3" fill="#c9ced6" stroke="#9aa1ac"/>
    <path d="M263,18 l0,-8" stroke="#9aa1ac"/>
    <text x="263" y="14" textAnchor="middle" fontSize="7" fill={BCP.dgray}>Stack {fmt(stack.value,0)}°</text>
    {/* convection section */}
    <rect x="98" y="60" width="120" height="40" rx="4" fill="#dfe3e8" stroke="#aab0ba"/>
    <text x="158" y="55" textAnchor="middle" fontSize="8" fill={BCP.dgray} fontWeight="600">Convection</text>
    <path d="M218,70 L250,55" stroke="#9aa1ac" strokeWidth="6" opacity=".5"/>
    {/* O2 / draft near stack */}
    <text x="284" y="40" fontSize="8" fill={bandStatus(o2)==='alarm'?BCP.red:BCP.black}>O₂ {fmt(o2.value,2)}%</text>
    <text x="284" y="54" fontSize="8" fill={BCP.dgray}>draft {fmt(draft.value,1)}</text>
    {/* radiation box */}
    <rect x="90" y="100" width="140" height="160" rx="6" fill="url(#furnGrad)" stroke="#8a9099" strokeWidth="1.5"/>
    <defs><linearGradient id="furnGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#f3f4f6"/><stop offset="1" stopColor="#e2e5ea"/></linearGradient></defs>
    <text x="160" y="118" textAnchor="middle" fontSize="9" fontWeight="700" fill={BCP.black}>F101 Radiation</text>
    {/* 4 coil passes colored by skin temp */}
    {passes.map((p,i)=>(<g key={i}>
      <line x1="100" y1={py[i]} x2="220" y2={py[i]} stroke={skinColor(p.skin_val)} strokeWidth="5" strokeLinecap="round"/>
      <text x="96" y={py[i]+3} textAnchor="end" fontSize="7" fill={BCP.dgray}>P{p.pass}</text>
      <text x="224" y={py[i]+3} fontSize="7" fill={skinColor(p.skin_val)}>{fmt(p.skin_val,0)}°</text>
    </g>))}
    {/* body temps */}
    <text x="86" y="180" textAnchor="end" fontSize="7.5" fill={BCP.dgray}>body {fmt((b1.value+b2.value)/2,0)}°</text>
    {/* crude in (CIT) bottom-left */}
    <path d="M20,250 L90,250" stroke={crudeColor(cit)} strokeWidth="4" markerEnd="url(#fmar)"/>
    <defs><marker id="fmar" viewBox="0 0 10 8" refX="8" refY="4" markerWidth="7" markerHeight="6" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill={crudeColor(cit)}/></marker></defs>
    <text x="20" y="244" fontSize="8" fill={crudeColor(cit)} fontWeight="600">Crude เข้า · CIT {fmt(cit,0)}°</text>
    {/* COT out top-right */}
    <path d="M230,105 L300,105" stroke={crudeColor(cot.value)} strokeWidth="4" markerEnd="url(#fmar)"/>
    <text x="300" y="99" textAnchor="end" fontSize="8" fill="#c0392b" fontWeight="600">COT ออก {fmt(cot.value,0)}°</text>
    {/* burners + FG at bottom */}
    {[120,160,200].map(x=><path key={x} d={`M${x},262 l-6,14 l12,0 z`} fill="#ff751f" opacity=".85"/>)}
    <text x="160" y="292" textAnchor="middle" fontSize="8" fill="#e6550d" fontWeight="600">🔥 Fuel Gas {fmt(fg.value,2)} t/h</text>
   </svg>);
}

function FurnacePanel({topo,params,setParams,ranking,economics,engPriorityByHX,fgLimitOv,setFgLimitOv,freshness}){
  // per-constraint limit overrides -- persisted locally (localStorage) since edits here are a
  // reference/export value only for 12 of the 13 rows: no live band-status calc consumes `limit`.
  // FG_FLOW is the ONE exception (see fgLimitOv/setFgLimitOv, lifted to App level) -- it's the
  // only limit the real cleaning-plan optimizer reads (via furnace_fg_deficit_ceiling_C), so it
  // rides in the SAME "คำนวณใหม่" request CleaningPlanPanel already sends, instead of just
  // localStorage, so editing it here and recomputing genuinely changes the schedule.
  const [limitOv,setLimitOv]=useState(()=>{try{return JSON.parse(localStorage.getItem('cpht_constraint_limit_overrides')||'{}');}catch(e){return {};}});
  const setLimit=(k,v)=>{const n={...limitOv};if(v==null||Number.isNaN(v))delete n[k];else n[k]=v;localStorage.setItem('cpht_constraint_limit_overrides',JSON.stringify(n));setLimitOv(n);};
  if(!topo) return null;
  const F=topo.furnace, passes=topo.passes;
  const citRow=F.find(x=>x.key==='CIT');
  const cit=citRow?.value;
  // CIT_TARGET/CIT_MIN read from pfd_topology.json's own CIT row (target/limit, already
  // 258.05/250 there -- notebooks/build_dashboard_topology.py's single source) instead of
  // duplicating those numbers in DEFAULT_PARAMS; params.CIT_TARGET/CIT_MIN remain only as
  // the fallback if topology data is somehow missing them.
  const citTarget=citRow?.target??params.CIT_TARGET;
  const citMin=citRow?.limit??params.CIT_MIN;
  const citDef=Math.max(0,citTarget-cit);
  const charge=topo.nodes['E113A']?.cold_flow_val||525;
  const dFG=(dC)=>charge*params.RHO_CRUDE*params.CP_CRUDE*dC/(params.LHV_FG*params.FURNACE_EFF); // kg/h
  const fgFlow=F.find(x=>x.key==='FG_FLOW')?.value||6.66;
  const grouped={}; F.forEach(f=>{(grouped[f.group||'อื่น ๆ']=grouped[f.group||'อื่น ๆ']||[]).push(f);});
  const maxSkin=Math.max(...passes.map(p=>p.skin_val||0));

  // --- operator advisory when a constraint leaves its normal band (ข้อ 3) ---
  const advisories=(F||[]).map(f=>{const s=bandStatus(f); if(s==='ok'||s==='na')return null;
    const b=f.band; let msg=null;
    if(b){ if(f.value<b[1])msg=f.advice_lo||f.advice_hi; else if(f.value>b[2])msg=f.advice_hi||f.advice_lo; }
    msg=msg||f.advice_hi||f.advice_lo;
    return msg?{key:f.key,name:f.name,val:f.value,unit:f.unit,status:s,msg}:null;}).filter(Boolean);
  const passAdv=(passes||[]).filter(p=>p.skin_val>=(p.skin_alarm||400)*0.98)
    .map(p=>({key:'P'+p.pass,name:'Pass '+p.pass+' tube-skin',val:p.skin_val,unit:'°C',status:'alarm',msg:p.advice}));
  const allAdv=[...advisories,...passAdv];

  // --- what-if optimization: PLANT formula (Energy Saving Benefit slide) ---
  // Saving[฿/ปี] = ΔCIT × STD_ENERGY(0.74 MMBTU/D/KBD/°C) × Feed[KBD] × NG[฿/MMBTU] × 360 × decay(0.5)
  // ΔCIT ต่อ HX จาก economics.json (วัดจริง median ก่อน, fallback โมเดล); ล้มกลับสูตร LHV เดิมถ้าไม่มีไฟล์
  //
  // When economics.per_hx is available, its rows already carry saving_thb_yr/baht_day/
  // payback_days/legacy_fg_reduction_ton_h/legacy_co2_reduction_ton_day/cum_* -- all
  // computed once by pipeline/export_economics.py using the exact same plant formula this
  // panel used to duplicate client-side. Reading those fields directly (instead of
  // recomputing them here) closes the two-independent-implementations gap flagged in
  // docs/CURRENT_PIPELINE_MAP.md/docs/archive/MIGRATION_PLAN.md Phase 1 item B3: the JS side no
  // longer has its own copy of the economics formula to silently drift from the pipeline's.
  const feedKBD=charge*24/params.M3_PER_BBL/1000;
  const plantYr=(dC)=>dC*params.STD_ENERGY*feedKBD*params.NG_PRICE*360*params.CIT_DECAY;
  const rows_e=economics&&economics.per_hx&&economics.per_hx.length?economics.per_hx:null;
  const cand=rows_e?rows_e:[...ranking].filter(r=>r.expected_CIT_gain_C>0).sort((a,b)=>a.priority_rank-b.priority_rank)
    .map((r,i)=>({HX:r.HX,rank:i+1,cit_gain_C:r.expected_CIT_gain_C,cit_gain_source:'model',cleaning_cost:params.CLEANING_COST}));
  const wf=useMemo(()=>{
    if(rows_e){
      // published rows already carry the full waterfall -- just re-shape field names for the table below
      return rows_e.map(r=>({hx:r.HX,gain:r.cit_gain_C,src:r.cit_gain_source,gainModel:r.cit_gain_model_C,
        fgTh:r.legacy_fg_reduction_ton_h,co2Day:r.legacy_co2_reduction_ton_day,
        bahtDay:r.baht_day,yr:r.saving_thb_yr,cost:r.cleaning_cost,payback:r.payback_days,
        cumCIT:r.cum_cit_C,cumYr:r.cum_saving_thb_yr,cumBaht:r.cum_baht_day,cumCO2:r.cum_co2_reduction_ton_day}));
    }
    // fallback only: economics.json unavailable -- recompute locally from ranking's model estimate
    // (same params-driven formula export_economics.py uses, kept here purely so the panel still
    // renders something before the first pipeline run has produced economics.json)
    let cCIT=0,cYr=0; return cand.map(r=>{
      const dC=r.cit_gain_C; const yr=plantYr(dC); const bahtDay=yr/360;
      const fgTh=dFG(dC)/1000; const co2Day=fgTh*24*params.CO2_FACTOR;
      const cost=r.cleaning_cost||params.CLEANING_COST;
      cCIT+=dC; cYr+=yr;
      return {hx:r.HX,gain:dC,src:r.cit_gain_source,gainModel:r.cit_gain_model_C,fgTh,bahtDay,yr,cost,co2Day,
              payback:bahtDay>0?cost/bahtDay:null,cumCIT:cCIT,cumYr:cYr,cumBaht:cYr/360,cumCO2:0};
    });
  },[cand,rows_e,params,charge]);

  const econ=[['NG_PRICE','ราคา NG (฿/MMBTU)'],['STD_ENERGY','Std Energy (MMBTU/D/KBD/°C)'],['CIT_DECAY','CIT decay factor'],['CLEANING_COST','ค่าล้าง default (฿)']];

  return (
   <div className="space-y-5 fade-up">
    {/* freshness badge: topology regenerated more recently than ranking/economics, and/or
        hx_ranking.json out of sync with engineering_priority.json (see the useEffect in
        App() that computes `freshness`) */}
    {freshness?.stale&&(
      <div className="rounded-xl bg-[#D9A400]/[.08] border border-[#D9A400]/30 px-4 py-2.5 flex items-start gap-2.5">
        <span className="text-[#D9A400] text-base">🕓</span>
        <div className="text-[11.5px] text-bcp-black/80">
          {freshness.topoStale&&<div>
            <b>ข้อมูลอาจไม่ตรงรอบกัน:</b> P&ID/เตา (pfd_topology.json) อัปเดตหลังจากอันดับความเสี่ยง/ความคุ้มค่า
            (hx_ranking.json/economics.json) — มักเกิดจากการกด "อัปเดตด่วน" (topology อย่างเดียว) โดยยังไม่รัน
            pipeline เต็ม (notebooks 01→02→08→06→13) รอบใหม่ ตัวเลขที่แสดงร่วมกันด้านล่างอาจมาจากคนละรอบข้อมูล
          </div>}
          {freshness.rankVsEngStale&&<div className={freshness.topoStale?'mt-1':''}>
            <b>อันดับสองแหล่งไม่ตรงกัน:</b> hx_ranking.json กับ engineering_priority.json ควรมีค่า
            engineering_priority_score เท่ากันเสมอ (มาจาก notebook 08 ตัวเดียวกัน — ดู
            docs/CURRENT_PIPELINE_MAP.md) แต่ตอนนี้เขียนคนละเวลากัน มักเกิดจากการรัน pipeline
            บางส่วน (เช่น --only 13) โดยไม่ได้รัน notebook 08 ใหม่ด้วย
          </div>}
        </div>
      </div>)}

    {/* alert banner if CIT low */}
    {cit<citMin&&(
      <div className="rounded-xl bg-bcp-red/[.07] border border-bcp-red/25 px-4 py-3 flex items-start gap-3">
        <span className="text-bcp-red text-lg">⚠</span>
        <div className="text-[12.5px] text-bcp-black/85">
          <b className="text-bcp-red">CIT ต่ำกว่าเกณฑ์:</b> ปัจจุบัน {fmt(cit,1)}°C (ขั้นต่ำ {citMin}, เป้า {citTarget}°C)
          — ขาด {fmt(citDef,1)}°C → เตาเผา FG เพิ่ม ~<b>{fmt(dFG(citDef)/1000,3)} t/h</b> (~{fmt(dFG(citDef)/1000/fgFlow*100,1)}% ของ {fmt(fgFlow,2)})
          <span className="block mt-0.5">ต้นทุนการเดินที่ CIT ต่ำ (สูตรโรงงาน): <b className="text-bcp-red">~{Math.round(citDef*params.STD_ENERGY*feedKBD*params.NG_PRICE).toLocaleString()} ฿/วัน</b> (≈{(citDef*params.STD_ENERGY*feedKBD*params.NG_PRICE*360/1e6).toFixed(1)} ล้านบาท/ปี ถ้าคงอยู่ทั้งปี)</span>
        </div>
      </div>)}

    {/* furnace picture + problem cascade */}
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-4">
        <h2 className="text-[15px] font-bold text-bcp-black mb-1">เตา F101 · ภาพรวมสด</h2>
        <p className="text-[11px] text-bcp-dgray mb-1">สี pass = อุณหภูมิผิว tube (เขียว→แดง = ร้อนขึ้น/เสี่ยง coking) · ค่าจริง ณ {topo.last_timestamp?.slice(0,10)}</p>
        <FurnaceSVG F={F} passes={passes} cit={cit} params={params}/>
      </div>
      <div className="rounded-2xl bg-gradient-to-br from-[#2a1a10] to-[#3a2415] text-white shadow-card p-5">
        <h3 className="text-[14px] font-bold mb-1">Problem: fouling → เตาทำงานหนักขึ้น</h3>
        <p className="text-[11px] text-white/45 mb-3">โซ่ผลกระทบเมื่อ preheat train สกปรก (ไฮไลต์ = กำลังเกิดตอนนี้)</p>
        {[['Preheat-train fouling','ตะกรันสะสมใน HX',true],
          ['CIT ↓','CIT ตกจากเป้า '+fmt(citDef,1)+'°C',cit<citTarget],
          ['Firing ↑','เผา FG เพิ่ม ~'+fmt(dFG(citDef)/1000,2)+' t/h',citDef>0.5],
          ['Draft ↑ / O₂ ต้องจัดการ','flue gas มากขึ้น',bandStatus(F.find(x=>x.key==='O2'))!=='ok'],
          ['Tube skin ร้อน → Coking / Hot spot','pass ร้อนสุด '+fmt(maxSkin,0)+'°C',maxSkin>380],
          ['NOx ↑ · Flame length ↑','ความเสี่ยง combustion',false],
          ['Economic loss + อายุเตาสั้นลง','ต้นทุน + เสี่ยง forced outage',citDef>2]].map(([t,sub,hot],i)=>(
          <div key={i} className={`flex items-start gap-2 py-1.5 ${i<6?'border-b border-white/[.06]':''}`}>
            <span className="mt-0.5 text-[13px]">{hot?'🔴':'⚪'}</span>
            <div><div className={`text-[12px] font-semibold ${hot?'text-bcp-orange':'text-white/70'}`}>{t}</div>
              <div className="text-[10px] text-white/40">{sub}</div></div>
          </div>))}
      </div>
    </div>

    {/* full constraint table (grouped, editable optimize-limit) */}
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
      <h3 className="text-[14px] font-bold text-bcp-black mb-1">Constraint ทั้งหมด · ค่าที่ตั้งไว้ (สำหรับตั้ง Optimization)</h3>
      <p className="text-[11px] text-bcp-dgray mb-1">ค่าปัจจุบัน (สด) · setpoint/target ที่ตั้ง · limit ที่แก้ได้ในช่อง</p>
      <p className="text-[10.5px] text-bcp-green bg-bcp-green/[.06] border border-bcp-green/20 rounded-lg px-3 py-1.5 mb-1">✓ <b>FG_FLOW limit ใช้จริงใน cleaning-plan optimizer</b> แล้ว (furnace_fg_deficit_ceiling_C) — แก้ค่าแล้วกด "คำนวณใหม่" ที่แท็บ "แผนล้าง HX" เพื่อรันจริง</p>
      <p className="text-[10.5px] text-bcp-orange bg-bcp-orange/[.06] border border-bcp-orange/20 rounded-lg px-3 py-1.5 mb-3">⚠ อีก 12 ช่องที่เหลือ <b>อ้างอิงเท่านั้น</b> ยังไม่มี optimizer อ่านค่าไปใช้จริง — บันทึกไว้ในเบราว์เซอร์นี้เท่านั้น ไม่กระทบสถานะ 🔴🟡🟢 หรือคำแนะนำด้านล่าง</p>
      {Object.entries(grouped).map(([grp,items])=>(
        <div key={grp} className="mb-3">
          <div className="text-[11px] font-bold text-bcp-turq uppercase tracking-wide mb-1">{grp}</div>
          <table className="w-full text-[12px]"><tbody className="divide-y divide-black/[.03]">
            {items.map(f=>{const s=bandStatus(f);return(
              <tr key={f.key}>
                <td className="py-1.5 w-[16%]"><span className="font-semibold text-bcp-black">{f.tag.replace('.pv','')}</span></td>
                <td className="py-1.5 text-[11px] text-bcp-dgray">{f.name}</td>
                <td className="py-1.5 text-right w-[13%]"><span className="font-bold tabular-nums" style={{color:s==='alarm'?BCP.red:s==='warn'?'#D9A400':BCP.black}}>{fmt(f.value,f.unit==='%'?2:1)}</span> <span className="text-[9px] text-bcp-dgray">{f.unit}</span></td>
                <td className="py-1.5 text-right w-[11%] text-[11px] text-bcp-dgray">SP {fmt(f.target,1)}</td>
                <td className="py-1.5 text-right w-[12%]">
                  <span className="text-[10px] mr-1" title={f.key==='FG_FLOW'?'ใช้จริงใน optimizer':'อ้างอิงเท่านั้น'} style={{color:f.key==='FG_FLOW'?BCP.green:BCP.dgray}}>limit{f.key==='FG_FLOW'&&' ✓'}</span>
                  {f.key==='FG_FLOW'?(
                    <input type="number" step="any" value={fgLimitOv??f.limit??''}
                      onChange={e=>setFgLimitOv(e.target.value===''?null:parseFloat(e.target.value))}
                      className="w-16 text-[11px] text-right rounded border border-bcp-green/40 px-1 py-0.5 focus:border-bcp-green outline-none"/>
                  ):(
                    <input type="number" step="any" value={limitOv[f.key]??f.limit??''}
                      onChange={e=>setLimit(f.key,e.target.value===''?null:parseFloat(e.target.value))}
                      className="w-16 text-[11px] text-right rounded border border-black/10 px-1 py-0.5 focus:border-bcp-green outline-none"/>
                  )}</td>
                <td className="py-1.5 text-center w-[8%]"><span className="h-2.5 w-2.5 rounded-full inline-block" style={{background:BAND_C[s]}}/></td>
              </tr>);})}
          </tbody></table>
        </div>))}
      <p className="text-[10px] text-bcp-dgray mt-1">🔴 alarm · 🟡 เฝ้าระวัง · 🟢 ปกติ · SP = setpoint/target</p>
    </div>

    {/* operator advisory (ข้อ 3) */}
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
      <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
        <h3 className="text-[14px] font-bold text-bcp-black">คำแนะนำเมื่อค่าออกนอกช่วง (Operator Advisory)</h3>
        <span className="text-[10px] text-bcp-orange bg-bcp-orange/10 px-2 py-0.5 rounded-full">คำแนะนำ + limit เป็นค่าสมมติ — รอวิศวกรยืนยัน</span>
      </div>
      {allAdv.length>0?<div className="space-y-2">
        {allAdv.map(a=><div key={a.key} className={`flex items-start gap-2.5 rounded-lg px-3 py-2 border ${a.status==='alarm'?'bg-bcp-red/[.05] border-bcp-red/20':'bg-[#D9A400]/[.06] border-[#D9A400]/25'}`}>
          <span className="mt-0.5">{a.status==='alarm'?'🔴':'🟡'}</span>
          <div><div className="text-[12px] font-semibold text-bcp-black">{a.name} <span className="text-bcp-dgray font-normal">= {fmt(a.val,1)} {a.unit}</span></div>
            <div className="text-[11.5px] text-bcp-black/75">{a.msg}</div></div></div>)}
      </div>:<div className="text-[12px] text-bcp-green bg-bcp-green/[.06] border border-bcp-green/15 rounded-lg px-3 py-2">🟢 ทุกค่าอยู่ในช่วงปกติ — ไม่มีคำแนะนำเร่งด่วน</div>}
    </div>

    {/* 4-pass detail (conv/skin/coil + flow) */}
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
      <h3 className="text-[14px] font-bold text-bcp-black mb-1">4 Passes · convection/skin/coil + flow</h3>
      <p className="text-[11px] text-bcp-dgray mb-3">tube-skin temp คือค่าวิกฤต (โลหะร้อน→coking/creep เมื่อ &gt; {passes[0]?.skin_alarm||400}°C)</p>
      <table className="w-full text-[12px]">
        <thead><tr className="text-left text-[10px] uppercase text-bcp-dgray border-b border-black/[.05]">
          <th className="py-2">Pass</th><th className="py-2 text-right">Convection out</th><th className="py-2 text-right">Tube skin</th><th className="py-2 text-right">Coil out</th><th className="py-2 text-right">Flow</th></tr></thead>
        <tbody className="divide-y divide-black/[.03]">
          {passes.map(p=>{const hot=p.skin_val>=(p.skin_alarm||400)*0.98;return(
            <tr key={p.pass}><td className="py-2 font-semibold">Pass {p.pass}</td>
              <td className="py-2 text-right tabular-nums">{fmt(p.conv_val,1)}°</td>
              <td className={`py-2 text-right tabular-nums font-bold ${hot?'text-bcp-red':''}`} style={{color:hot?undefined:skinColor(p.skin_val)}}>{fmt(p.skin_val,1)}°{hot?' ⚠':''}</td>
              <td className="py-2 text-right tabular-nums">{fmt(p.coil_val,1)}°</td>
              <td className="py-2 text-right tabular-nums text-bcp-dgray">{fmt(p.flow_val,1)}</td></tr>);})}
        </tbody></table>
    </div>

    {/* what-if optimization */}
    <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5">
      <div className="flex items-center justify-between flex-wrap gap-2 mb-1">

        <tbody className="divide-y divide-black/[.03]">
          {wf.map((r,i)=>{

            <td className="py-2 font-semibold text-bcp-black">{i+1}. {r.hx}</td>

            <td className="py-2 text-right tabular-nums text-bcp-dgray">{(r.cost/1e6).toFixed(1)}M</td>
            <td className="py-2 text-right tabular-nums text-bcp-dgray">{r.payback?Math.round(r.payback)+' วัน':'—'}</td>
            <td className="py-2 text-right tabular-nums font-semibold">+{fmt(r.cumCIT,1)}°</td>

            <td className="py-2 text-center tabular-nums text-bcp-dgray">
              {riskRank??'—'}{gapBig&&<span className="ml-0.5 text-bcp-orange cursor-help" title={`what-if นี้เรียง #${i+1} (hx_ranking.json) vs อันดับความเสี่ยงจริง #${riskRank} (notebook 08 — ใช้ในแท็บภาพรวม/แผนล้าง)`}>⚠</span>}</td>
            </tr>);})}
        </tbody></table></div>
      {wf.length>0&&<div className="mt-3 rounded-lg bg-bcp-green/[.06] border border-bcp-green/15 px-3 py-2 text-[12px]">
        ล้างครบทั้ง {wf.length} ตัว → คืน CIT รวม <b>+{fmt(wf[wf.length-1].cumCIT,1)}°C</b> ·
        ประหยัด <b className="text-bcp-green">~{(wf[wf.length-1].cumYr/1e6).toFixed(1)} ล้านบาท/ปี</b> (≈{Math.round(wf[wf.length-1].cumBaht).toLocaleString()} ฿/วัน)
        · * = ΔCIT จากโมเดล (ยังไม่มีค่าวัดจริง อาจสูงกว่าจริง)
      </div>}

      {/* economics plot: ฿/วัน ต่อ HX (bar) + สะสม (line) (ข้อ 7) */}
      {wf.length>0&&<div className="mt-4" style={{width:'100%',height:230}}><ResponsiveContainer>
        <ComposedChart data={wf.map(r=>({hx:r.hx,baht:Math.round(r.bahtDay),cum:Math.round(r.cumBaht),payback:r.payback?Math.round(r.payback):null}))} margin={{top:8,right:14,left:0,bottom:0}}>
          <CartesianGrid stroke="#EEF0ED" vertical={false}/>
          <XAxis dataKey="hx" tick={{fill:BCP.dgray,fontSize:10}} axisLine={{stroke:'#E4E7E3'}} tickLine={false}/>
          <YAxis yAxisId="l" tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false} width={54} tickFormatter={v=>(v/1000)+'k'}/>
          <YAxis yAxisId="r" orientation="right" tick={{fill:BCP.dgray,fontSize:10}} axisLine={false} tickLine={false} width={54} tickFormatter={v=>(v/1000)+'k'}/>
          <RTooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 8px 30px rgba(0,0,0,.12)',fontSize:11}} formatter={(v,n)=>[Math.round(v).toLocaleString()+' ฿/วัน',n==='baht'?'ต่อตัว':'สะสม']}/>
          <Bar yAxisId="l" dataKey="baht" name="฿/วัน (ต่อตัว)" fill={BCP.green} radius={[4,4,0,0]} maxBarSize={44}/>
          <Line yAxisId="r" type="monotone" dataKey="cum" name="สะสม ฿/วัน" stroke={BCP.turq} strokeWidth={2.2} dot={{r:2.5}}/>
          <Legend verticalAlign="top" height={20} iconType="plainline" wrapperStyle={{fontSize:11}}/>
        </ComposedChart></ResponsiveContainer></div>}

      <Basis title="ที่มาสูตรความคุ้มค่า (สูตรโรงงานจริง + cross-check)">
        <div>• <b>สูตรหลัก (โรงงาน — Energy Saving Benefit):</b> Saving[฿/ปี] = ΔCIT × {params.STD_ENERGY} MMBTU/D/KBD/°C × Feed({fmt(feedKBD,1)} KBD = charge×24/158.987) × NG {params.NG_PRICE} ฿/MMBTU × 360 วัน × {params.CIT_DECAY} (CIT decay factor — gain เฉลี่ยครึ่งหนึ่งเพราะตกกลับตลอด run).</div>
        <div>• ตรวจซ้ำกับสไลด์: ΔCIT=2°C, 80 KBD → 8,311,680 ฿/ปี ✓ (E113A วัดจริง 2.06°C → ~8.5M ฿/ปี สอดคล้อง).</div>
        <div>• <b>ΔCIT ต่อ HX:</b> ใช้ค่า "วัดจริง" (median จุดกระโดดตอนล้าง จาก Cleaning Audit History) ก่อน; ถ้าไม่มีใช้ค่าโมเดล (*, ระวังสูงกว่าจริง ~3× เช่น E113A โมเดล 6.1° vs จริง 2°).</div>
        <div>• <b>Cross-check (สมดุลพลังงาน):</b> เชื้อเพลิง = charge·ρ·Cp·ΔCIT/(LHV·η) — ต่างจากสูตรโรงงาน ~10-15% (สอดคล้องกัน)<AssumedTag/>.</div>
        <div>• ค่าล้างต่อ HX เป็นค่าสมมติตาม tier (swap &lt; online &lt; TAM) — รอราคาจริงจากโรงงาน · ตรงกับ <code>economics.json</code>.</div>
      </Basis>
    </div>
   </div>);
}

/* per-HX shell-and-tube drawing (counter-current), styled after the user's E101AB.svg */
function HXSchematic({hx,node}){
  const n=node; if(!n) return null;
  const cin=crudeColor(n.cold_in_val), cout=crudeColor(n.cold_out_val), hot=streamColor(n.hot_stream);
  const tag=t=>t?t.replace('.pv',''):'';
  const uid=`hx-${hx}`;
  const AH=(id,c)=>(<marker id={id} key={id} viewBox="0 0 8 8" refX="6" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill={c}/></marker>);
  return (
   <div className="rounded-xl mb-4 px-3 pt-2 pb-1" style={{background:'linear-gradient(150deg,#171733,#241a38)'}}>
    <div className="flex items-center justify-between mb-0.5">
      <span className="text-[10px] text-white/45">ผังตัวแลกเปลี่ยน · {n.hot_stream&&n.hot_stream!=='—'?`Crude vs ${n.hot_stream}`:'Crude'}</span>
      <span className="text-[9px] text-white/30">{n.cold_flow_tag?.replace('.pv','')} · {fmt(n.cold_flow_val,0)} m³/h{n.hot_flow_tag?` · ${n.hot_stream} ${n.hot_flow_tag.replace('.pv','')} · ${fmt(n.hot_flow_val,0)} m³/h`:''}</span>
    </div>
    <svg viewBox="0 0 320 138" className="w-full h-auto">
      <defs>
        <linearGradient id={`${uid}-sg`} x1="0" x2="1"><stop offset="0" stopColor="#2a2350"/><stop offset="1" stopColor="#3a2748"/></linearGradient>
        {AH(`${uid}-ac`,cout)}{AH(`${uid}-ah`,hot)}
      </defs>
      {/* shell + tube bundle */}
      <rect x="96" y="48" width="128" height="44" rx="12" fill={`url(#${uid}-sg)`} stroke="#ffffff" strokeOpacity=".25"/>
      {[58,70,82].map(y=><line key={y} x1="96" y1={y} x2="224" y2={y} stroke="#ffffff" strokeOpacity=".16" strokeWidth="1.5"/>)}
      <text x="160" y="74" textAnchor="middle" fontSize="11" fontWeight="700" fill="#fff">{hx}</text>
      {/* hot stream: top, right -> left (counter-current) */}
      <path d="M300,32 L210,32 L210,48" fill="none" stroke={hot} strokeWidth="3"/>
      <path d={`M110,48 L110,32 L20,32`} fill="none" stroke={hot} strokeWidth="3" markerEnd={`url(#${uid}-ah)`}/>
      {/* cold stream: bottom, left -> right */}
      <path d="M20,106 L110,106 L110,92" fill="none" stroke={cin} strokeWidth="3"/>
      <path d={`M210,92 L210,106 L300,106`} fill="none" stroke={cout} strokeWidth="3" markerEnd={`url(#${uid}-ac)`}/>
      {/* labels */}
      <text x="18" y="24" fontSize="8.5" fill={hot} fontWeight="600">{n.hot_stream} ออก {n.hot_out_val!=null?fmt(n.hot_out_val,0)+'°':''}</text>
      <text x="302" y="24" textAnchor="end" fontSize="8.5" fill={hot} fontWeight="600">{n.hot_stream} เข้า {n.hot_in_val!=null?fmt(n.hot_in_val,0)+'°':''}</text>
      <text x="18" y="124" fontSize="8.5" fill="#8fd0ff" fontWeight="600">{tag(n.cold_in_tag)} · {fmt(n.cold_in_val,0)}°</text>
      <text x="302" y="124" textAnchor="end" fontSize="8.5" fill={cout} fontWeight="600">{tag(n.cold_out_tag)} · {fmt(n.cold_out_val,0)}°</text>
    </svg>
   </div>);
}

function DetailPanel({hx,unit,onSim,simActive,fc,node}){
  if(!hx)return <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-6 text-center text-bcp-dgray grid place-items-center h-full"><div><div className="text-3xl mb-2">👆</div>เลือก HX จากแผนผัง</div></div>;
  const st=statusOf(unit),meta=ST[st],hasRank=unit&&unit.priority_rank!=null;
  return(
   <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5 h-full">
    <div className="flex items-center gap-3 mb-4">
      <div className="h-11 w-11 rounded-xl grid place-items-center text-white font-bold text-[13px] leading-tight text-center" style={{background:meta.c}} title="อันดับความเสี่ยง (Probability×Consequence/Effort) — คนละมุมกับอันดับในแท็บ &quot;แผนล้าง HX&quot; ซึ่งเรียงตามความคุ้มค่า×ข้อจำกัด">{hasRank?<>เสี่ยง<br/>#{unit.priority_rank}</>:'—'}</div>
      <div><div className="text-[18px] font-bold text-bcp-black">{hx}</div>
        <span className="text-[9px] font-semibold px-2 py-0.5 rounded-full text-white" style={{background:meta.c}}>{meta.th} · {meta.label}</span></div>
    </div>
    {node&&<HXSchematic hx={hx} node={node}/>}
    {hasRank?(<div className="space-y-3">
      <Metric label="Fouling Rate" v={fmt(unit.Q_fouling_rate_abs,2)} u="/100d"/>
      <Metric label="ΔQ Duty Drop" v={unit['Q_drop_%']!=null?fmt(unit['Q_drop_%'],1):'—'} u="%" warn={unit['Q_drop_%']>30}/>
      <Metric label="CIT คืนถ้าล้าง" v={unit.expected_CIT_gain_C!=null?'+'+fmt(unit.expected_CIT_gain_C,1):'—'} u="°C" good={unit.expected_CIT_gain_C>3}/>
      <Metric label="วิธีล้าง" v={effortTH[unit.online_mode||unit.effort_tier]||'—'}/>
      {/* sub-scores (A4) */}
      <div className="pt-2 border-t border-black/[.05]">
        <div className="text-[10px] uppercase tracking-wide text-bcp-dgray mb-1.5">Priority sub-scores</div>
        <SubBar label="Probability (จะถึงจุด)" v={unit.probability_score}/>
        <SubBar label="Consequence (ผลกระทบ)" v={unit.consequence_score}/>
      </div>
      <div className="flex flex-wrap gap-1.5 pt-1">
        {unit.safety_flag&&<span className="bg-red-50 text-red-600 text-[10px] font-semibold px-2 py-0.5 rounded-full">⚠ Safety</span>}
        {unit.worsening&&<span className="bg-bcp-orange/10 text-bcp-orange text-[10px] font-semibold px-2 py-0.5 rounded-full">↗ แย่ลง</span>}
        {unit.at_risk_within_6mo&&<span className="bg-bcp-blue/10 text-bcp-blue text-[10px] font-semibold px-2 py-0.5 rounded-full">⏱ เสี่ยง 6ด.</span>}
      </div>
      {fc&&<button onClick={onSim} className={`w-full mt-1 text-[12px] font-semibold py-2.5 rounded-xl transition-all ${simActive?'bg-bcp-green text-white':'bg-bcp-green/10 text-bcp-green hover:bg-bcp-green hover:text-white'}`}>{simActive?'● กำลังจำลองการล้าง':'🧪 จำลองการล้าง (Sandbox)'}</button>}
    </div>):(<div className="text-[13px] text-bcp-dgray py-8 text-center"><div className="text-3xl mb-2">📭</div>ไม่มีข้อมูล ranking สำหรับ {hx}</div>)}
   </div>);
}
function Metric({label,v,u='',warn,good}){return <div className="flex items-center justify-between"><span className="text-[12px] text-bcp-dgray">{label}</span><span className={`text-[14px] font-bold ${warn?'text-bcp-orange':good?'text-bcp-green':'text-bcp-black'}`}>{v}<span className="text-[10px] font-normal text-bcp-dgray ml-0.5">{u}</span></span></div>;}
function SubBar({label,v}){const p=Math.max(0,Math.min(1,v||0))*100;return <div className="mb-1.5"><div className="flex justify-between text-[10.5px] text-bcp-dgray"><span>{label}</span><span className="font-semibold text-bcp-black">{fmt(v,2)}</span></div><div className="h-1.5 rounded bg-black/[.06] mt-0.5"><div className="h-full rounded bg-bcp-turq" style={{width:`${p}%`}}/></div></div>;}

function ForecastChart({hx,fc,simActive,unit}){
  if(!fc)return <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-6 text-center text-bcp-dgray grid place-items-center h-full"><div><div className="text-3xl mb-2">📊</div>เลือก HX เพื่อดูพยากรณ์ตะกรัน</div></div>;
  const data=useMemo(()=>fc.dates.map((d,i)=>({date:d,dev:+fc.projected_deviation[i].toFixed(3),
    lo:fc.projected_lower?+fc.projected_lower[i].toFixed(3):undefined,
    hi:fc.projected_upper?+fc.projected_upper[i].toFixed(3):undefined,
    thr:+fc.threshold.toFixed(3),cleaned:simActive?+(fc.threshold*0.3).toFixed(3):undefined})),[fc,simActive]);
  const breach=data.find(p=>p.dev>p.thr);
  return(
   <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5 h-full">
    <div className="flex items-start justify-between flex-wrap gap-2 mb-1">
      <div><h2 className="text-[15px] font-bold text-bcp-black">พยากรณ์ตะกรัน 6 เดือน · <span className="text-bcp-green">{hx}</span></h2>
        <p className="text-[11px] text-bcp-dgray mt-0.5">ค่าเบี่ยงเบนจากสภาพสะอาด — ข้ามเส้นประ = ถึงเวลาล้าง</p></div>
      <div className="flex flex-wrap gap-3 text-[10.5px] text-bcp-dgray">
        <Pill c={BCP.black} t="พยากรณ์"/><Pill c={BCP.orange} dashed t="เกณฑ์ล้าง"/>
        {fc.projected_lower&&<Pill c={BCP.gray} t="ช่วงความเชื่อมั่น"/>}
        {simActive&&<Pill c={BCP.green} dashed t="หลังล้าง"/>}</div>
    </div>
    <div style={{width:'100%',height:270}}>
      <ResponsiveContainer><ComposedChart data={data} margin={{top:8,right:12,left:-8,bottom:0}}>
        <defs><linearGradient id="dev" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor={BCP.orange} stopOpacity=".16"/><stop offset="1" stopColor={BCP.orange} stopOpacity="0"/></linearGradient></defs>
        <CartesianGrid stroke="#EEF0ED" vertical={false}/>
        <XAxis dataKey="date" tickFormatter={d=>parseISO(d).toLocaleDateString('en-US',{month:'short'})} minTickGap={40} tick={{fill:BCP.dgray,fontSize:11}} axisLine={{stroke:'#E4E7E3'}} tickLine={false}/>
        <YAxis tick={{fill:BCP.dgray,fontSize:11}} axisLine={false} tickLine={false} width={42}/>
        <RTooltip contentStyle={{borderRadius:10,border:'none',boxShadow:'0 8px 30px rgba(0,0,0,.12)',fontSize:12}}/>
        {fc.projected_upper&&<Area type="monotone" dataKey="hi" stroke="none" fill={BCP.gray} fillOpacity=".18"/>}
        {fc.projected_lower&&<Area type="monotone" dataKey="lo" stroke="none" fill="#fff" fillOpacity="1"/>}
        <Area type="monotone" dataKey="dev" stroke="none" fill="url(#dev)"/>
        <Line type="monotone" dataKey="dev" stroke={BCP.black} strokeWidth={2.2} dot={false}/>
        <Line type="monotone" dataKey="thr" stroke={BCP.orange} strokeWidth={1.5} strokeDasharray="6 4" dot={false}/>
        {simActive&&<Line type="monotone" dataKey="cleaned" stroke={BCP.green} strokeWidth={2.2} strokeDasharray="6 5" dot={false}/>}
      </ComposedChart></ResponsiveContainer>
    </div>
    <div className="mt-1.5 flex flex-wrap gap-x-5 gap-y-1 text-[11px] text-bcp-dgray">
      <span>เกณฑ์: <b className="text-bcp-black">{fmt(fc.threshold,2)}</b></span>
      <span>ปัจจุบัน: <b className="text-bcp-black">{fmt(fc.current_deviation,2)}</b></span>
      {breach&&<span className="text-bcp-orange font-semibold">⚠ คาดข้ามเกณฑ์ ~{thaiDate(breach.date)}</span>}
      {unit&&unit.days_to_threshold_6mo!=null&&<span>ถึงจุดใน ~<b className="text-bcp-black">{Math.round(unit.days_to_threshold_6mo)}</b> วัน</span>}
    </div>

/* what-if: engineer sets a CIT limit -> when do we cross it, what does running low cost vs cleaning */
function CitLimitWhatIf({tamA,topo,params,econ}){
  const [limit,setLimit]=useState(params.CIT_MIN);
  const cit=topo?.furnace?.find(x=>x.key==='CIT')?.value;
  if(cit==null) return null;
  const decay=tamA?Math.abs(tamA.median_decay_C_per_month||0.5):0.5;   // °C/เดือน (วัดจริง 2021-2026)
  const feedKBD=(econ&&econ.feed_kbd)||79.3;
  const kDay=params.STD_ENERGY*feedKBD*params.NG_PRICE;                 // ฿/วัน/°C (สูตรโรงงาน)
  const gap=cit-limit;
  const daysToLimit=gap>0?Math.round(gap/(decay/30)):0;
  const below=gap<=0;
  const costNow=below?Math.round((limit-cit)*kDay):0;                   // ฿/วัน ที่เสียอยู่ตอนนี้
  // cost of delaying cleaning by 30 days once at/below limit: extra loss grows with decay
  const cost30=Math.round(kDay*(Math.max(0,limit-cit)+decay/2)*30);
  return(
   <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5 fade-up">
    <div className="flex items-center justify-between flex-wrap gap-2 mb-1">
      <h3 className="text-[14px] font-bold text-bcp-black">What-if · ตั้ง CIT limit แล้วดูผล</h3>
      <span className="text-[10px] text-bcp-turq bg-bcp-turq/10 px-2 py-0.5 rounded-full">decay {fmt(decay,2)}°C/เดือน = ค่าวัดจริง 2021-2026</span>
    </div>
    <div className="flex flex-wrap items-end gap-4 mb-3">
      <label className="text-[12px]"><span className="text-bcp-dgray block text-[11px] mb-0.5">CIT limit ที่ยอมรับได้ (°C)</span>
        <input type="number" step="0.5" value={limit} onChange={e=>setLimit(parseFloat(e.target.value)||0)}
          className="w-28 text-[15px] font-bold rounded-lg border border-black/15 px-2 py-1 focus:border-bcp-green outline-none"/></label>
      <div className="text-[12px] text-bcp-dgray">CIT ปัจจุบัน <b className="text-bcp-black text-[15px]">{fmt(cit,1)}°C</b></div>
    </div>
    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
      <div className={`rounded-xl px-4 py-3 border ${below?'bg-bcp-red/[.06] border-bcp-red/25':'bg-bcp-green/[.05] border-bcp-green/20'}`}>
        <div className="text-[10px] uppercase font-semibold text-bcp-dgray">สถานะเทียบ limit</div>
        {below?<div className="text-[14px] font-bold text-bcp-red mt-1">ต่ำกว่า limit แล้ว {fmt(limit-cit,1)}°C</div>
          :<div className="text-[14px] font-bold text-bcp-black mt-1">เหลือ ~{daysToLimit} วัน <span className="text-[11px] font-normal text-bcp-dgray">({thaiDate(addDaysISO(new Date().toISOString().slice(0,10),daysToLimit))}) ที่ decay ปัจจุบัน</span></div>}
      </div>
      <div className="rounded-xl px-4 py-3 border bg-black/[.02] border-black/[.06]">
        <div className="text-[10px] uppercase font-semibold text-bcp-dgray">ต้นทุนเดินต่ำกว่า limit</div>
        <div className="text-[14px] font-bold text-bcp-black mt-1">{below?`~${costNow.toLocaleString()} ฿/วัน (ตอนนี้)`:`~${Math.round(kDay).toLocaleString()} ฿/วัน ต่อทุก 1°C ใต้ limit`}</div>
        <div className="text-[10.5px] text-bcp-dgray">สูตรโรงงาน: {params.STD_ENERGY}×{fmt(feedKBD,1)} KBD×{params.NG_PRICE}฿</div>
      </div>
      <div className="rounded-xl px-4 py-3 border bg-black/[.02] border-black/[.06]">
        <div className="text-[10px] uppercase font-semibold text-bcp-dgray">เลื่อนล้างออกไป 30 วัน (เมื่อถึง limit)</div>
        <div className="text-[14px] font-bold text-bcp-orange mt-1">เสียเพิ่ม ~{cost30.toLocaleString()} ฿</div>
        <div className="text-[10.5px] text-bcp-dgray">เทียบค่าล้าง ~0.15–0.4M ฿/ครั้ง (baseline สมมติ) → ใช้ตัดสิน "ล้างเลย vs รอ"</div>
      </div>
    </div>
    <Basis title="ที่มาการคิด CIT limit what-if">
      <div>• เวลาถึง limit = (CIT ปัจจุบัน − limit) ÷ decay rate · decay = median slope ต่อรอบจากข้อมูล 2021-2026 (tam_analysis) {tamA?'':'(ยังไม่มีไฟล์ — ใช้ 0.5°C/เดือนชั่วคราว)'}.</div>
      <div>• ต้นทุนใต้ limit = Δ°C × STD_ENERGY × Feed × NG (สูตรโรงงาน) · เลื่อนล้าง 30 วัน = ∫(deficit ที่โตขึ้น) ≈ (deficit + decay/2)×30×฿/°C/วัน.</div>

/* ═════════ INTEGRATED CLEANING PLAN (แผนเดียว) — cleaning_plan.json ═════════
   Single practical plan: network-constrained schedule + per-HX economics + criticality,
   priority-ranked (net-saving × risk). Replaces the separate v1/v2 tables. */
// tier-aware defaults -- SWAP_CAPABLE HX (E113A/E112C) are cleaned by physically swapping in the
// spare shell and pulling the fouled one, not by dosing chemical online -- the "ล้าง online
// (chemical)" option doesn't apply to them (TAM_ONLY HX never reach this editor at all: they're
// online=false, so they never appear in the table this formula editor lives in). online_mode
// comes from per_hx (real bypass data, see src/domain/bypass.py), not a guess.
const CLEANING_METHOD_DEFAULTS=(onlineMode)=>({methods:[
  ...(onlineMode==='SWAP_CAPABLE'?[]:[{label:'ล้าง online (chemical)',base_cost:150000,variable_cost_per_day:5000,downtime_cost_per_day:20000,duration_days:2}]),
  {label:'สลับเชลล์ / bundle pull',base_cost:300000,variable_cost_per_day:0,downtime_cost_per_day:0,duration_days:0},
]});
// mirrors pipeline/export_economics.resolve_cost_override -- same shape, same "cheapest method wins" rule,
// so what the operator sees client-side matches what the backend actually computes after "คำนวณใหม่".
const resolveCostOverride=(override,fallback)=>{
  if(override==null) return {cost:fallback,meta:null};
  if(typeof override==='number') return {cost:override,meta:null};
  if(override.methods&&override.methods.length){
    const priced=override.methods.map(m=>({label:m.label||'?',
      cost:(+m.base_cost||0)+((+m.variable_cost_per_day||0)+(+m.downtime_cost_per_day||0))*(+m.duration_days||0)}))
      .sort((a,b)=>a.cost-b.cost);
    return {cost:priced[0].cost,meta:{chosen:priced[0].label,all:priced}};
  }
  return {cost:fallback,meta:null};
};

function CleaningPlanPanel({plan,onPlanUpdated,fgLimitOv}){
  const [costOv,setCostOv]=useState(()=>{try{return JSON.parse(localStorage.getItem('cpht_cleaning_cost_overrides')||'{}');}catch(e){return {};}});
  const [recompute,setRecompute]=useState({busy:false,msg:null,err:false});
  const [formulaHX,setFormulaHX]=useState(null);   // HX whose formula editor is open, or null
  if(!plan||!plan.per_hx) return <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-8 text-center text-bcp-dgray fade-up">
    ยังไม่มี <code>cleaning_plan.json</code> — รัน <code>notebooks/16_cleaning_plan_optimization.ipynb</code> (หรือ run_all.py)</div>;
  const asOf=parseISO(plan.as_of), tam=parseISO(plan.next_tam);
  // multi-TAM-cycle horizon: plan.tam_dates covers every TAM cycle the network scheduler knows
  // about (currently 2 -- 2028 and 2032); per_hx_full_horizon has real (already-computed) clean
  // dates spanning all of them. When present, plot the whole horizon instead of stopping at the
  // first TAM.
  const tamDateStrs=(Array.isArray(plan.tam_dates)&&plan.tam_dates.length?plan.tam_dates:[plan.next_tam]);
  // tam_dates_confirmed[i] is false for TAM cycles the plant hasn't locked in yet (currently
  // only the first/next TAM is confirmed) -- render those distinctly so the plan doesn't look
  // more certain than it is that far out.
  const tamConfirmed=i=>!Array.isArray(plan.tam_dates_confirmed)||plan.tam_dates_confirmed[i]!==false;
  const hasFullHorizon=Array.isArray(plan.per_hx_full_horizon)&&plan.per_hx_full_horizon.length>0;
  const horizonEnd=hasFullHorizon?parseISO(tamDateStrs[tamDateStrs.length-1]):tam;
  const span=horizonEnd-asOf;
  const xPos=d=>Math.min(100,Math.max(0,(parseISO(d)-asOf)/span*100));
  const fullByHX=Object.fromEntries((plan.per_hx_full_horizon||[]).map(r=>[r.HX,r]));
  // calendar-year (พ.ศ.) gridlines across the plotted horizon, purely a rendering aid
  const yearMarks=[];
  for(let y=asOf.getFullYear()+1;;y++){const d=new Date(y,0,1);if(d>=horizonEnd)break;yearMarks.push(d);}
  const rows=[...plan.per_hx].sort((a,b)=>(a.priority_rank||99)-(b.priority_rank||99));
  const online=rows.filter(p=>p.online), tamOnly=rows.filter(p=>!p.online);
  const t=plan.totals||{}, c=plan.constraints||{};
  const onlineModeByHX=Object.fromEntries(rows.map(r=>[r.HX,r.online_mode]));
  const saveOv=n=>{localStorage.setItem('cpht_cleaning_cost_overrides',JSON.stringify(n));setCostOv(n);};
  const setCost=(hx,v)=>{const n={...costOv};if(v==null||Number.isNaN(v))delete n[hx];else n[hx]=v;saveOv(n);};
  const setMethodField=(hx,idx,field,val)=>{
    const n={...costOv};
    const cur=(n[hx]&&n[hx].methods)?n[hx]:CLEANING_METHOD_DEFAULTS(onlineModeByHX[hx]);
    const methods=cur.methods.map((m,i)=>i===idx?{...m,[field]:val===''?0:+val}:m);
    n[hx]={methods};
    saveOv(n);
  };
  const setMethodLabel=(hx,idx,label)=>{
    const n={...costOv};
    const cur=(n[hx]&&n[hx].methods)?n[hx]:CLEANING_METHOD_DEFAULTS(onlineModeByHX[hx]);
    n[hx]={methods:cur.methods.map((m,i)=>i===idx?{...m,label}:m)};
    saveOv(n);
  };
  const toggleFormula=hx=>{
    if(formulaHX===hx){setFormulaHX(null);return;}
    if(!(costOv[hx]&&costOv[hx].methods)) setCost(hx,CLEANING_METHOD_DEFAULTS(onlineModeByHX[hx]));
    setFormulaHX(hx);

  const liveCost=p=>resolveCostOverride(costOv[p.HX],p.cleaning_cost).cost;
  const livePayback=p=>{const cost=liveCost(p),base=p.cleaning_cost,pb=p.payback_days;return (cost&&base&&pb)?Math.round(pb*cost/base*10)/10:pb;};
  // live "คุ้มมั้ย?" check: reacts instantly to the cost input above without waiting for the
  // backend recompute, by comparing against fuel_value_per_clean_thb (already computed by
  // notebook 16 -- how much fuel-gas cost is avoided per clean). Falls back to the notebook's
  // own worth_it when there's no live cost override and no fuel value to compare against.
  const liveWorthIt=p=>{

  const [citFloor,setCitFloor]=useState(()=>plan?.max_cit_deficit_C_applied??8.05);

      const r=await fetch('/api/recompute-tam-comparison',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});

    }catch(e){
      setTamCmp(s=>({...s,busy:false,err:true,msg:'ไม่สำเร็จ: '+e.message+' — ต้องเปิด backend: python backend/server.py'}));

  return(
   <div className="rounded-2xl bg-white shadow-card border border-black/[.04] p-5 fade-up">
